<!DOCTYPE html>
<html lang="cs" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regresní analýza</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23c83030'/><polyline points='4,26 10,18 16,20 22,10 28,6' fill='none' stroke='white' stroke-width='2.8' stroke-linecap='round' stroke-linejoin='round'/><circle cx='10' cy='18' r='2' fill='white'/><circle cx='16' cy='20' r='2' fill='white'/><circle cx='22' cy='10' r='2' fill='white'/><line x1='4' x2='28' y1='28' y2='28' stroke='white' stroke-width='1.5' opacity='0.4'/><line x1='4' x2='4' y1='4' y2='28' stroke='white' stroke-width='1.5' opacity='0.4'/></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#18181c;--surface:#22222a;--surface2:#2a2a33;
  --border:#383844;--text:#e8e8f0;--text-muted:#7070880;
  --accent:#4a9eff;--danger:#ff6060;--danger-h:#ff7c7c;
  --success:#4cde8c;--btn:#2a2a33;--btn-h:#34343e;
  --chart:#1c1c24;--shadow:0 4px 20px rgba(0,0,0,.5);
  --muted:#7070880;
}
[data-theme="dark"]{
  --text-muted:#70708a;
}
[data-theme="light"]{
  --bg:#f0f0f5;--surface:#ffffff;--surface2:#f5f5fa;
  --border:#dcdce8;--text:#18181c;--text-muted:#666675;
  --accent:#2060c0;--danger:#c83030;--danger-h:#b82020;
  --success:#1a8840;--btn:#ffffff;--btn-h:#ebebf2;
  --chart:#fafafa;--shadow:0 4px 20px rgba(0,0,0,.12);
}

body{
  font-family:'Sora',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;transition:background .3s,color .3s;
}

.app{display:flex;flex-direction:column;height:100vh;padding:14px;gap:10px;}

.topbar{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:10px 16px;
  box-shadow:var(--shadow);
}
.app-title{font-size:17px;font-weight:700;white-space:nowrap;}
.app-title span{color:var(--accent);}

select#rType{
  flex:1;max-width:310px;
  background:var(--btn);color:var(--text);
  border:1px solid var(--border);border-radius:8px;
  padding:6px 10px;font-family:'Sora',sans-serif;font-size:13.5px;
  cursor:pointer;outline:none;transition:border-color .2s;
  appearance:auto;
}
select#rType:focus{border-color:var(--accent);}

.tbtn{
  background:var(--btn);color:var(--text);
  border:1px solid var(--border);border-radius:8px;
  padding:6px 14px;font-family:'Sora',sans-serif;font-size:13px;
  cursor:pointer;transition:background .15s;white-space:nowrap;outline:none;
}
.tbtn:hover{background:var(--btn-h);}
.spacer{flex:1;}

.main{display:flex;gap:14px;flex:1;min-height:0;}

.left{display:flex;flex-direction:column;gap:8px;width:260px;flex-shrink:0;}

.right{
  flex:1;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:14px;
  display:flex;align-items:stretch;justify-content:center;
  min-width:0;box-shadow:var(--shadow);
}
.chart-area{
  flex:1;min-width:0;
  display:flex;flex-direction:column;gap:8px;
}
.chart-box{
  flex:1;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:14px;
  display:flex;align-items:stretch;justify-content:center;
  min-height:0;box-shadow:var(--shadow);
}
.eq-bar{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:9px 14px;
  font-family:'Fira Code',monospace;font-size:13px;
  font-weight:600;color:var(--accent);
  box-shadow:var(--shadow);white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;
}
.side-panel{
  display:flex;flex-direction:column;gap:8px;
  width:280px;flex-shrink:0;
}

.icon-bar{
  display:flex;gap:6px;
}
.icon-btn{
  flex:1;background:var(--btn);color:var(--text);
  border:1px solid var(--border);border-radius:8px;
  padding:8px 0;font-size:18px;cursor:pointer;
  transition:background .15s,border-color .15s;outline:none;
  position:relative;text-align:center;line-height:1;
}
.icon-btn:hover{background:var(--btn-h);}
.icon-btn.active{border-color:var(--accent);color:var(--accent);background:var(--btn-h);}
.icon-btn .icon-label{
  display:block;font-size:9px;font-family:'Sora',sans-serif;
  color:var(--text-muted);margin-top:3px;letter-spacing:.03em;
}

.rtype-dropdown{
  display:none;position:absolute;top:calc(100% + 6px);left:0;right:0;
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;box-shadow:var(--shadow-lg);z-index:200;
  overflow:hidden;min-width:240px;
}
.rtype-dropdown.open{display:block;}
.rtype-option{
  display:block;width:100%;padding:9px 14px;
  background:transparent;border:none;text-align:left;
  font-family:'Sora',sans-serif;font-size:13px;color:var(--text);
  cursor:pointer;transition:background .12s;
}
.rtype-option:hover{background:var(--btn-h);}
.rtype-option.selected{color:var(--accent);font-weight:600;}
.results-panel{
  flex:1;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:11px 13px;font-size:13px;
  box-shadow:var(--shadow);display:flex;flex-direction:column;
  min-height:0;overflow-y:auto;
}

.sec-label{
  font-size:11px;font-weight:600;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:.07em;padding-left:2px;
}

.tbl-wrap{
  flex:1;overflow-y:auto;border-radius:10px;
  border:1px solid var(--border);background:var(--surface);
  min-height:140px;
}
table{width:100%;border-collapse:collapse;}
thead th{
  position:sticky;top:0;z-index:1;
  background:var(--surface2);color:var(--text-muted);
  font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;
  padding:7px 8px;border-bottom:1px solid var(--border);text-align:center;
}
thead th:nth-child(1){width:32px;}
thead th:nth-child(2){width:46px;}
thead th:nth-child(3),thead th:nth-child(4){width:calc((100% - 78px)/2);}
tbody tr{border-bottom:1px solid var(--border);}
tbody tr:last-child{border-bottom:none;}
tbody tr:nth-child(even){background:var(--surface2);}
tbody tr:hover{background:var(--btn-h);}
td{padding:3px 5px;text-align:center;vertical-align:middle;}
td.row-num{font-family:'Fira Code',monospace;font-size:11px;color:var(--text-muted);user-select:none;}
td input[type="checkbox"]{
  width:16px;height:16px;accent-color:var(--accent);cursor:pointer;
}
td input.cell{
  width:100%;background:transparent;color:var(--text);
  border:none;outline:none;
  font-family:'Fira Code',monospace;font-size:12.5px;
  text-align:right;padding:5px 6px;border-radius:4px;transition:background .12s;
}
td input.cell:focus{
  background:var(--btn-h);
  outline:1.5px solid var(--accent);outline-offset:-1.5px;
}

.btns{display:flex;flex-direction:column;gap:5px;}
.btn{
  border:1px solid var(--border);border-radius:8px;
  padding:7px 12px;font-family:'Sora',sans-serif;font-size:13.5px;
  cursor:pointer;transition:all .15s;outline:none;
}
.btn-primary{
  background:var(--danger);border-color:var(--danger);
  color:#fff;font-weight:700;font-size:14.5px;text-align:center;
}
.btn-primary:hover{background:var(--danger-h);border-color:var(--danger-h);}
.btn-sec{background:var(--btn);color:var(--text);}
.btn-sec:hover{background:var(--btn-h);}

.r2{color:var(--success);font-weight:600;}
.err{color:var(--danger);}
.res-eq{
  font-weight:600;font-size:13.5px;color:var(--accent);
  margin-bottom:7px;word-break:break-all;
}
.res-params{
  font-family:'Fira Code',monospace;font-size:11.5px;
  color:var(--text);line-height:1.85;flex:1;
}

.chart-wrap{width:100%;height:100%;position:relative;}
.sel-overlay{
  position:absolute;inset:0;z-index:10;
  display:none;cursor:crosshair;
}
.sel-overlay.active{display:block;}
.sel-rect{
  position:absolute;
  border:2px solid var(--accent);
  background:rgba(74,158,255,.12);
  pointer-events:none;
}

.tbl-wrap::-webkit-scrollbar{width:5px;}
.tbl-wrap::-webkit-scrollbar-track{background:transparent;}
.tbl-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

@media(max-width:900px){
  .app{height:auto;}
  .main{flex-direction:column;}
  .left,.side-panel{width:100%;}
  .chart-area{min-height:320px;}
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="app-title"><svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32' style='width:22px;height:22px;vertical-align:middle;margin-right:7px;'><rect width='32' height='32' rx='7' fill='%23c83030'/><polyline points='4,26 10,18 16,20 22,10 28,6' fill='none' stroke='white' stroke-width='2.8' stroke-linecap='round' stroke-linejoin='round'/><circle cx='10' cy='18' r='2' fill='white'/><circle cx='16' cy='20' r='2' fill='white'/><circle cx='22' cy='10' r='2' fill='white'/><line x1='4' x2='28' y1='28' y2='28' stroke='white' stroke-width='1.5' opacity='0.4'/><line x1='4' x2='4' y1='4' y2='28' stroke='white' stroke-width='1.5' opacity='0.4'/></svg><div style="display:inline-flex;flex-direction:column;vertical-align:middle;line-height:1.2;"><span>Regresní analýza <span style="font-size:11px;font-weight:400;color:var(--text-muted);">v1.0</span></span><span style="font-size:10px;font-weight:400;color:var(--text-muted);letter-spacing:.04em;">© Šimon Svoboda</span></div></div>
    <div class="spacer"></div>
    <select class="tbtn" id="themeSelect" onchange="setTheme(this.value)">
      <option value="system">🖥️ Systém</option>
      <option value="light">☀️ Světlý</option>
      <option value="dark">🌙 Tmavý</option>
    </select>
  </header>

  <div class="main">
    <div class="left">
      <div class="sec-label" style="white-space:nowrap;">Zadejte data (x, y):</div>
      <div style="display:flex;gap:4px;">
        <button onclick="document.getElementById('file-input').click()" title="Načíst soubor"
          style="background:transparent;border:none;cursor:pointer;font-size:17px;padding:2px 4px;line-height:1;opacity:.6;transition:opacity .15s;"
          onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='.6'">📂</button>
        <button onclick="saveData()" title="Uložit data jako TXT"
          style="background:transparent;border:none;cursor:pointer;font-size:17px;padding:2px 4px;line-height:1;opacity:.6;transition:opacity .15s;color:var(--text)"
          onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='.6'">💾</button>
        <button onclick="swapXY()" title="Prohodit x a y"
          style="background:transparent;border:none;cursor:pointer;font-size:17px;padding:2px 4px;line-height:1;opacity:.6;transition:opacity .15s;"
          onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='.6'">🔄</button>
        <button onclick="clearData()" title="Smazat data"
          style="background:transparent;border:none;cursor:pointer;font-size:17px;padding:2px 4px;line-height:1;opacity:.6;transition:opacity .15s;"
          onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='.6'">🗑️</button>
        <input type="file" id="file-input" accept=".txt,.csv,.tsv,.dat" style="display:none" onchange="loadFile(this)">
      </div>
      <div style="display:grid;grid-template-columns:32px 46px 1fr 1fr;gap:4px;padding:0 1px;">
        <div></div><div></div>
        <input id="label-x" type="text" placeholder="osa x" value="x"
          style="background:var(--btn);color:var(--text);border:1px solid var(--border);
                 border-radius:7px;padding:4px 8px;font-family:'Sora',sans-serif;font-size:12px;outline:none;min-width:0;"
          oninput="axisLabels.x=this.value.trim()||'x'; axisLabelsFromFile=true; if(chartInst){if(regressionOn)computeRegression();else showPointsOnly();}">
        <input id="label-y" type="text" placeholder="osa y" value="y"
          style="background:var(--btn);color:var(--text);border:1px solid var(--border);
                 border-radius:7px;padding:4px 8px;font-family:'Sora',sans-serif;font-size:12px;outline:none;min-width:0;"
          oninput="axisLabels.y=this.value.trim()||'y'; axisLabelsFromFile=true; if(chartInst){if(regressionOn)computeRegression();else showPointsOnly();}">
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>#</th><th><input type="checkbox" id="cb-all" checked onchange="toggleAll(this.checked)" title="Zaškrtnout/odškrtnout vše"></th><th>x</th><th>y</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="chart-area">
      <div class="chart-box">
        <div class="chart-wrap">
          <canvas id="myChart"></canvas>
          <div class="sel-overlay" id="sel-overlay"></div>
        </div>
      </div>
      <div class="eq-bar">
        <div id="eq-general" style="color:var(--text-muted);font-size:12px;"></div>
        <div id="resEq" style="margin-top:2px;">—</div>
      </div>
    </div>

    <div class="side-panel">

      <div class="sec-label" style="white-space:nowrap;">Nastavení regresní analýzy:</div>

      <!-- Řádek ikon -->
      <div style="display:flex;gap:4px;">

        <!-- Výběr regrese -->
        <div style="position:relative;" id="rtype-wrap">
          <button onclick="toggleRtypeDropdown()" title="Typ regrese"
            style="background:transparent;border:none;cursor:pointer;font-size:17px;padding:2px 4px;line-height:1;opacity:.6;transition:opacity .15s;"
            onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='.6'">📈</button>
          <div class="rtype-dropdown" id="rtype-dropdown">
            <button class="rtype-option selected" onclick="selectRtype('linear',this)">Lineární (y = ax + b)</button>
            <button class="rtype-option" onclick="selectRtype('exponential',this)">Exponenciální (y = a·e^(bx))</button>
            <button class="rtype-option" onclick="selectRtype('polynomial',this)">Polynomická 2° (y = ax² + bx + c)</button>
            <button class="rtype-option" onclick="selectRtype('logarithmic',this)">Logaritmická (y = a·ln(x) + b)</button>
            <button class="rtype-option" onclick="selectRtype('gaussian',this)">Gauss</button>
            <button class="rtype-option" onclick="selectRtype('gaussian2',this)">2× Gauss</button>
            <button class="rtype-option" onclick="selectRtype('gaussian3',this)">3× Gauss</button>
          </div>
        </div>

        <button id="btn-select" onclick="toggleSelectMode()" title="Vybrat oblast"
          style="background:transparent;border:none;cursor:pointer;font-size:19px;padding:2px 4px;line-height:1;opacity:.6;transition:opacity .15s;color:var(--text)"
          onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='.6'">▣</button>

        <button id="btn-ci" onclick="toggleCI()" title="Interval spolehlivosti 95 %"
          style="background:transparent;border:none;cursor:pointer;font-size:15px;padding:2px 4px;line-height:1;opacity:.6;transition:opacity .15s;font-weight:700;font-family:'Sora',sans-serif;color:var(--text)"
          onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='.6'">95%</button>

        <button onclick="saveGraph()" title="Uložit graf (PNG)"
          style="background:transparent;border:none;cursor:pointer;font-size:17px;padding:2px 4px;line-height:1;opacity:.6;transition:opacity .15s;color:var(--text)"
          onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='.6'">💾</button>

        <button id="btn-regrese" onclick="toggleRegression()" title="Spustit analýzu"
          style="background:transparent;border:none;cursor:pointer;font-size:17px;padding:2px 4px;line-height:1;opacity:.6;transition:opacity .15s;color:var(--text)"
          onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='.6'">📊</button>

      </div>

      <!-- Skrytý select pro kompatibilitu s JS -->
      <select id="rType" style="display:none" onchange="updateGeneralEq(); recomputeKeepVis()">
        <option value="linear">Lineární (y = ax + b)</option>
        <option value="exponential">Exponenciální (y = a·e^(bx))</option>
        <option value="polynomial">Polynomická 2° (y = ax² + bx + c)</option>
        <option value="logarithmic">Logaritmická (y = a·ln(x) + b)</option>
        <option value="gaussian">Gauss</option>
        <option value="gaussian2">2× Gauss</option>
        <option value="gaussian3">3× Gauss</option>
      </select>

      <div class="results-panel">
        <div class="sec-label" style="margin-bottom:8px;">Regresní parametry:</div>
        <div class="res-params" id="resParams"></div>
      </div>
    </div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
let chartInst  = null;
let isDark     = false;
let themeChoice = 'system';
let lastResult = null;
let lastData   = null;
let regressionOn = false;
let showCI = false;
let axisLabels = {x:'x', y:'y'};
let axisLabelsFromFile = false; // true pouze pokud byla detekována hlavička ze souboru

const sysMQ = window.matchMedia('(prefers-color-scheme: dark)');
sysMQ.addEventListener('change', () => {
  if(themeChoice === 'system') applyTheme(true);
});

function applyTheme(rerender){
  isDark = themeChoice === 'system'
         ? sysMQ.matches
         : themeChoice === 'dark';
  document.documentElement.dataset.theme = isDark ? 'dark' : 'light';
  if(rerender && chartInst){
    // Ulož stav viditelnosti před překreslením
    const vis = chartInst.data.datasets.map((_,i)=>chartInst.isDatasetVisible(i));
    if(regressionOn) computeRegression(); else showPointsOnly();
    // Obnov stav viditelnosti
    if(chartInst) vis.forEach((v,i)=>{ if(!v) chartInst.hide(i); });
    if(chartInst) chartInst.update();
  }
}

function setTheme(choice){
  themeChoice = choice;
  applyTheme(true);
}

/* ══════════════════════════════════════════════
   MATH UTILITIES
══════════════════════════════════════════════ */
const sum  = a => a.reduce((s,v)=>s+v,0);
const mean = a => sum(a)/a.length;

function calcR2(y, yp) {
  const ym = mean(y);
  const tot = sum(y.map(v=>(v-ym)**2));
  const res = sum(y.map((v,i)=>(v-yp[i])**2));
  return tot < 1e-14 ? 1 : 1 - res/tot;
}

function matT(A) {
  return A[0].map((_,j)=>A.map(r=>r[j]));
}

function matMul(A,B) {
  return A.map(row=>B[0].map((_,j)=>row.reduce((s,v,k)=>s+v*B[k][j],0)));
}

function inv2(M) {
  const det = M[0][0]*M[1][1] - M[0][1]*M[1][0];
  if(Math.abs(det)<1e-14) throw new Error("Singulární matice – body leží na přímce?");
  return [[ M[1][1]/det,-M[0][1]/det],
          [-M[1][0]/det, M[0][0]/det]];
}

function inv3(M) {
  const [a,b,c]=M[0],[d,e,f]=M[1],[g,h,k]=M[2];
  const det = a*(e*k-f*h) - b*(d*k-f*g) + c*(d*h-e*g);
  if(Math.abs(det)<1e-14) throw new Error("Singulární matice – zkuste jiný typ regrese.");
  return [[(e*k-f*h)/det,(c*h-b*k)/det,(b*f-c*e)/det],
          [(f*g-d*k)/det,(a*k-c*g)/det,(c*d-a*f)/det],
          [(d*h-e*g)/det,(b*g-a*h)/det,(a*e-b*d)/det]];
}

function calcSE(Xd, y, yp, p) {
  const n = y.length;
  const s2 = sum(y.map((v,i)=>(v-yp[i])**2)) / Math.max(n-p, 1);
  const Xt = matT(Xd);
  const XtX = matMul(Xt, Xd);
  const inv = p===2 ? inv2(XtX) : inv3(XtX);
  return inv.map((_,i) => Math.sqrt(Math.max(0, inv[i][i]*s2)));
}

function linRaw(x, y) {
  const Xd = x.map(xi=>[xi,1]);
  const Xt = matT(Xd);
  const XtX = matMul(Xt,Xd);
  const XtY = Xt.map(r=>sum(r.map((v,j)=>v*y[j])));
  const inv = inv2(XtX);
  const p = inv.map(r=>sum(r.map((v,j)=>v*XtY[j])));
  return {a:p[0], b:p[1]};
}

/* ══════════════════════════════════════════════
   REGRESSION FUNCTIONS
══════════════════════════════════════════════ */
function f6(v){return v>=0?v.toFixed(6):String(v.toFixed(6));}

function doLinear(x,y){
  const {a,b}=linRaw(x,y);
  const yp=x.map(xi=>a*xi+b);
  const r2=calcR2(y,yp);
  const Xd=x.map(xi=>[xi,1]);
  const [seA,seB]=calcSE(Xd,y,yp,2);
  return{type:'linear',a,b,seA,seB,r2,yp,
         eq:`y = ${f6(a)}x + ${f6(b)}`,
         smooth:xi=>a*xi+b};
}

function doExponential(x,y){
  if(y.some(v=>v<=0)) throw new Error("Exponenciální regrese vyžaduje všechny y > 0");
  const lnY=y.map(Math.log);
  const {a:bP, b:lnA}=linRaw(x,lnY);
  const a=Math.exp(lnA), b=bP;
  const yp=x.map(xi=>a*Math.exp(b*xi));
  const r2=calcR2(y,yp);
  const Xd=x.map(xi=>[xi,1]);
  const [seA,seB]=calcSE(Xd,y,yp,2);
  return{type:'exponential',a,b,seA,seB,r2,yp,
         eq:`y = ${f6(a)}·e^(${f6(b)}x)`,
         smooth:xi=>a*Math.exp(b*xi)};
}

function doPolynomial(x,y){
  if(x.length<3) throw new Error("Polynomiální regrese 2° vyžaduje alespoň 3 body.");
  const Xd=x.map(xi=>[xi*xi,xi,1]);
  const Xt=matT(Xd);
  const XtX=matMul(Xt,Xd);
  const XtY=Xt.map(r=>sum(r.map((v,j)=>v*y[j])));
  const inv=inv3(XtX);
  const [a,b,c]=inv.map(r=>sum(r.map((v,j)=>v*XtY[j])));
  const yp=x.map(xi=>a*xi*xi+b*xi+c);
  const r2=calcR2(y,yp);
  const [seA,seB,seC]=calcSE(Xd,y,yp,3);
  return{type:'polynomial',a,b,c,seA,seB,seC,r2,yp,
         eq:`y = ${f6(a)}x² + ${f6(b)}x + ${f6(c)}`,
         smooth:xi=>a*xi*xi+b*xi+c};
}

function doLogarithmic(x,y){
  if(x.some(v=>v<=0)) throw new Error("Logaritmická regrese vyžaduje všechny x > 0");
  const lnX=x.map(Math.log);
  const {a,b}=linRaw(lnX,y);
  const yp=x.map(xi=>a*Math.log(Math.max(xi,1e-10))+b);
  const r2=calcR2(y,yp);
  const Xd=x.map(xi=>[Math.log(Math.max(xi,1e-10)),1]);
  const [seA,seB]=calcSE(Xd,y,yp,2);
  return{type:'logarithmic',a,b,seA,seB,r2,yp,
         eq:`y = ${f6(a)}·ln(x) + ${f6(b)}`,
         smooth:xi=>a*Math.log(Math.max(xi,1e-10))+b};
}

/* ── Gauss-Jordan solver (pro LM) ── */
function solveGE(A,b){
  const n=b.length;
  const M=A.map((row,i)=>[...row,b[i]]);
  for(let col=0;col<n;col++){
    let maxRow=col;
    for(let row=col+1;row<n;row++) if(Math.abs(M[row][col])>Math.abs(M[maxRow][col])) maxRow=row;
    [M[col],M[maxRow]]=[M[maxRow],M[col]];
    if(Math.abs(M[col][col])<1e-14) continue;
    for(let row=0;row<n;row++){
      if(row===col) continue;
      const f=M[row][col]/M[col][col];
      for(let k=col;k<=n;k++) M[row][k]-=f*M[col][k];
    }
  }
  return M.map((row,i)=>row[n]/row[i]);
}

/* ── Levenberg-Marquardt ── */
function lmFit(xd,yd,p0,fn,jac,maxIter=400,tol=1e-10){
  let p=[...p0], lam=0.01;
  const res=p=>xd.map((xi,i)=>yd[i]-fn(xi,p));
  const sse=p=>res(p).reduce((s,r)=>s+r*r,0);
  for(let iter=0;iter<maxIter;iter++){
    const r=res(p);
    const J=xd.map(xi=>jac(xi,p));
    const m=p.length;
    const JtJ=Array.from({length:m},(_,a)=>Array.from({length:m},(_,b)=>J.reduce((s,j)=>s+j[a]*j[b],0)));
    const Jtr=Array.from({length:m},(_,a)=>J.reduce((s,j,i)=>s+j[a]*r[i],0));
    const Alam=JtJ.map((row,i)=>row.map((v,j)=>i===j?v*(1+lam):v));
    let dp; try{dp=solveGE(Alam,Jtr);}catch(e){break;}
    const pNew=p.map((v,i)=>v+dp[i]);
    if(sse(pNew)<sse(p)){
      p=pNew; lam=Math.max(lam/10,1e-8);
      if(Math.sqrt(dp.reduce((s,v)=>s+v*v,0))<tol) break;
    } else { lam=Math.min(lam*10,1e8); }
  }
  return p;
}

/* ── 4×4 matrix inverse (pro SE gaussovky) ── */
function inv4(A){
  const n=4;
  const M=A.map((row,i)=>[...row,...Array.from({length:n},(_,j)=>i===j?1:0)]);
  for(let col=0;col<n;col++){
    let maxRow=col;
    for(let row=col+1;row<n;row++) if(Math.abs(M[row][col])>Math.abs(M[maxRow][col])) maxRow=row;
    [M[col],M[maxRow]]=[M[maxRow],M[col]];
    if(Math.abs(M[col][col])<1e-14) return null;
    const sc=M[col][col];
    for(let k=0;k<2*n;k++) M[col][k]/=sc;
    for(let row=0;row<n;row++){
      if(row===col) continue;
      const f=M[row][col];
      for(let k=0;k<2*n;k++) M[row][k]-=f*M[col][k];
    }
  }
  return M.map(row=>row.slice(n));
}

function doGaussian(x,y){
  if(x.length<5) throw new Error("Gaussovský fit vyžaduje alespoň 5 bodů.");
  const ymax=Math.max(...y), ymin=Math.min(...y);
  const A0=ymax-ymin;
  const mu0=x[y.indexOf(ymax)];
  const c0=ymin;
  const half=c0+A0/2;
  const above=x.filter((_,i)=>y[i]>=half);
  const sig0=above.length>1?(Math.max(...above)-Math.min(...above))/2.355 : (Math.max(...x)-Math.min(...x))/6;

  const fn=(xi,[A,mu,sig,c])=>A*Math.exp(-((xi-mu)**2)/(2*sig**2))+c;
  const jac=(xi,[A,mu,sig,c])=>{
    const e=Math.exp(-((xi-mu)**2)/(2*sig**2));
    return[e, A*e*(xi-mu)/sig**2, A*e*(xi-mu)**2/sig**3, 1];
  };

  let [A,mu,sig,c]=lmFit(x,y,[A0,mu0,Math.abs(sig0),c0],fn,jac);
  sig=Math.abs(sig);
  const yp=x.map(xi=>fn(xi,[A,mu,sig,c]));
  const r2=calcR2(y,yp);

  const Jac=x.map(xi=>jac(xi,[A,mu,sig,c]));
  const m=4, n=x.length;
  const JtJ=Array.from({length:m},(_,a)=>Array.from({length:m},(_,b)=>Jac.reduce((s,j)=>s+j[a]*j[b],0)));
  const s2=yp.reduce((s,ypi,i)=>s+(y[i]-ypi)**2,0)/Math.max(n-m,1);
  const Cinv=inv4(JtJ);
  const se=Cinv?Cinv.map((row,i)=>Math.sqrt(Math.max(0,row[i]*s2))):[0,0,0,0];

  const FWHM=2*Math.sqrt(2*Math.log(2))*sig;
  const seFWHM=2*Math.sqrt(2*Math.log(2))*se[2];

  return{
    type:'gaussian', a:A, b:mu, c:sig, d:c,
    seA:se[0], seB:se[1], seC:se[2], seD:se[3],
    FWHM, seFWHM, r2, yp,
    eq:`y = ${f6(A)}·exp(-(x-${f6(mu)})²/(2·${f6(sig)}²)) + ${f6(c)}`,
    smooth:xi=>fn(xi,[A,mu,sig,c])
  };
}

/* ── Multi-Gaussian fit ── */
function doMultiGaussian(x, y, nPeaks){
  if(x.length < 5*nPeaks) throw new Error(`Fit ${nPeaks}× Gauss vyžaduje alespoň ${5*nPeaks} bodů.`);

  // Automatický odhad počátečních parametrů — najdi nPeaks lokálních maxim
  const ymin=Math.min(...y), ymax=Math.max(...y);
  const c0=ymin;

  // Najdi lokální maxima jako kandidáty peaků
  const peaks=[];
  for(let i=1;i<x.length-1;i++){
    if(y[i]>y[i-1]&&y[i]>y[i+1]) peaks.push({x:x[i],y:y[i],i});
  }
  // Seřaď sestupně podle výšky, vezmi top nPeaks
  peaks.sort((a,b)=>b.y-a.y);
  const topPeaks=peaks.slice(0,nPeaks);
  // Pokud nemáme dost lokálních maxim, rovnoměrně rozmístíme
  while(topPeaks.length<nPeaks){
    const idx=Math.floor(x.length/(nPeaks+1))*(topPeaks.length+1);
    topPeaks.push({x:x[Math.min(idx,x.length-1)],y:y[Math.min(idx,x.length-1)]});
  }
  topPeaks.sort((a,b)=>a.x-b.x);

  const sigEst=(Math.max(...x)-Math.min(...x))/(nPeaks*3);

  // Počáteční parametry: [A1, mu1, sig1, A2, mu2, sig2, ..., c]
  const p0=[...topPeaks.flatMap(p=>[Math.max(p.y-c0,1), p.x, sigEst]), c0];

  const fn=(xi,p)=>{
    let s=p[p.length-1]; // c
    for(let k=0;k<nPeaks;k++){
      const A=p[k*3], mu=p[k*3+1], sig=p[k*3+2];
      s+=A*Math.exp(-((xi-mu)**2)/(2*sig**2));
    }
    return s;
  };

  const jac=(xi,p)=>{
    const grad=new Array(p.length).fill(0);
    for(let k=0;k<nPeaks;k++){
      const A=p[k*3], mu=p[k*3+1], sig=p[k*3+2];
      const e=Math.exp(-((xi-mu)**2)/(2*sig**2));
      grad[k*3]  = e;
      grad[k*3+1]= A*e*(xi-mu)/sig**2;
      grad[k*3+2]= A*e*(xi-mu)**2/sig**3;
    }
    grad[p.length-1]=1; // dc
    return grad;
  };

  let pOpt=lmFit(x,y,p0,fn,jac,600,1e-10);
  // Zajisti kladná sigma
  for(let k=0;k<nPeaks;k++) pOpt[k*3+2]=Math.abs(pOpt[k*3+2]);
  // Seřaď peaky podle polohy mu
  const peakParams=[];
  for(let k=0;k<nPeaks;k++) peakParams.push([pOpt[k*3],pOpt[k*3+1],pOpt[k*3+2]]);
  peakParams.sort((a,b)=>a[1]-b[1]);
  pOpt=[...peakParams.flat(), pOpt[pOpt.length-1]];

  const yp=x.map(xi=>fn(xi,pOpt));
  const r2=calcR2(y,yp);

  // Standardní chyby — numerický Jacobián pro obecnou velikost
  const m=p0.length, n=x.length;
  const Jac=x.map(xi=>jac(xi,pOpt));
  const JtJ=Array.from({length:m},(_,a)=>Array.from({length:m},(_,b)=>Jac.reduce((s,j)=>s+j[a]*j[b],0)));
  const s2=yp.reduce((s,ypi,i)=>s+(y[i]-ypi)**2,0)/Math.max(n-m,1);
  // Obecná inverze (Gauss-Jordan)
  const Minv=Array.from({length:m},(_,i)=>Array.from({length:m},(_,j)=>i===j?1:0));
  const Mcopy=JtJ.map(r=>[...r]);
  for(let col=0;col<m;col++){
    let maxRow=col;
    for(let row=col+1;row<m;row++) if(Math.abs(Mcopy[row][col])>Math.abs(Mcopy[maxRow][col])) maxRow=row;
    [Mcopy[col],Mcopy[maxRow]]=[Mcopy[maxRow],Mcopy[col]];
    [Minv[col],Minv[maxRow]]=[Minv[maxRow],Minv[col]];
    if(Math.abs(Mcopy[col][col])<1e-14) continue;
    const sc=Mcopy[col][col];
    for(let k=0;k<m;k++){Mcopy[col][k]/=sc; Minv[col][k]/=sc;}
    for(let row=0;row<m;row++){
      if(row===col) continue;
      const f=Mcopy[row][col];
      for(let k=0;k<m;k++){Mcopy[row][k]-=f*Mcopy[col][k]; Minv[row][k]-=f*Minv[col][k];}
    }
  }
  const se=Minv.map((row,i)=>Math.sqrt(Math.max(0,row[i]*s2)));

  const FWHMs=peakParams.map((_,k)=>({
    FWHM: 2*Math.sqrt(2*Math.log(2))*pOpt[k*3+2],
    seFWHM: 2*Math.sqrt(2*Math.log(2))*se[k*3+2]
  }));

  const eqParts=peakParams.map((_,k)=>`${f6(pOpt[k*3])}·e^(-(x-${f6(pOpt[k*3+1])})²/(2·${f6(pOpt[k*3+2])}²))`).join(' + ');

  return{
    type:`gaussian${nPeaks}`, nPeaks, params:pOpt, se, FWHMs, r2, yp,
    eq:`y = ${eqParts} + ${f6(pOpt[pOpt.length-1])}`,
    eqShort:'fit',
    smooth:xi=>fn(xi,pOpt)
  };
}

/* ══════════════════════════════════════════════
   TABLE MANAGEMENT
══════════════════════════════════════════════ */
function addRow(){
  const tb=document.getElementById('tbody');
  const row=tb.rows.length;
  const tr=document.createElement('tr');
  tr.innerHTML=`
    <td class="row-num">${row+1}</td>
    <td><input type="checkbox" checked onchange="autoRecompute()"></td>
    <td><input class="cell" type="text" placeholder="" data-r="${row}" data-c="x"
               onkeydown="handleKey(event,${row},'x')" oninput="autoRecompute()"></td>
    <td><input class="cell" type="text" placeholder="" data-r="${row}" data-c="y"
               onkeydown="handleKey(event,${row},'y')" oninput="autoRecompute()"></td>`;
  tb.appendChild(tr);
}

function handleKey(e,row,col){
  if(e.key!=='Enter') return;
  e.preventDefault();
  if(col==='x'){
    focusCell(row,'y');
  } else {
    const tb=document.getElementById('tbody');
    if(row===tb.rows.length-1) addRow();
    focusCell(row+1,'x');
  }
}

function focusCell(row,col){
  const el=document.querySelector(`[data-r="${row}"][data-c="${col}"]`);
  if(el) el.focus();
}

function initTable(){
  for(let i=0;i<6;i++) addRow();
}

function getTableData(){
  const tb=document.getElementById('tbody');
  const x=[],y=[],excl=[];
  for(let i=0;i<tb.rows.length;i++){
    const row=tb.rows[i];
    const cb=row.cells[1].querySelector('input[type="checkbox"]');
    const xv=row.cells[2].querySelector('input').value.trim().replace(',','.');
    const yv=row.cells[3].querySelector('input').value.trim().replace(',','.');
    if(!xv||!yv) continue;
    const xf=parseFloat(xv), yf=parseFloat(yv);
    if(isNaN(xf)||isNaN(yf)) continue;
    if(cb&&cb.checked){ x.push(xf); y.push(yf); }
    else excl.push([xf,yf]);
  }
  return{x,y,excl};
}

/* ══════════════════════════════════════════════
   COMPUTE
══════════════════════════════════════════════ */
function toggleCI(){
  showCI=!showCI;
  const btn=document.getElementById('btn-ci');
  if(showCI){
    btn.style.opacity='1';
    btn.style.color='var(--accent)';
  } else {
    btn.style.opacity='.6';
    btn.style.color='var(--text)';
  }
  recomputeKeepVis();
}

function toggleRtypeDropdown(){
  const dd=document.getElementById('rtype-dropdown');
  dd.classList.toggle('open');
}

function selectRtype(value, btn){
  // Update hidden select
  const sel=document.getElementById('rType');
  sel.value=value;
  // Update option highlight
  document.querySelectorAll('.rtype-option').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  // Close dropdown
  document.getElementById('rtype-dropdown').classList.remove('open');
  updateGeneralEq();
  recomputeKeepVis();
}

// Close dropdown when clicking outside
document.addEventListener('click',e=>{
  const wrap=document.getElementById('rtype-wrap');
  if(wrap && !wrap.contains(e.target)){
    document.getElementById('rtype-dropdown')?.classList.remove('open');
  }
});

function updateGeneralEq(){
  const general={
    linear:'y = ax + b',
    exponential:'y = a·e^(bx)',
    polynomial:'y = ax² + bx + c',
    logarithmic:'y = a·ln(x) + b',
    gaussian:'y = A·e^(-(x-μ)²/2σ²) + c',
    gaussian2:'y = A₁·e^(-(x-μ₁)²/2σ₁²) + A₂·e^(-(x-μ₂)²/2σ₂²) + c',
    gaussian3:'y = A₁·e^(-(x-μ₁)²/2σ₁²) + A₂·e^(-(x-μ₂)²/2σ₂²) + A₃·e^(-(x-μ₃)²/2σ₃²) + c'
  };
  const type=document.getElementById('rType').value;
  const el=document.getElementById('eq-general');
  if(el) el.textContent=general[type]||'';
}

function recomputeKeepVis(){
  const vis=chartInst?chartInst.data.datasets.map((_,i)=>chartInst.isDatasetVisible(i)):[];
  if(regressionOn) computeRegression(); else showPointsOnly();
  if(chartInst) vis.forEach((v,i)=>{ if(!v) chartInst.hide(i); });
  if(chartInst) chartInst.update();
}

let recomputeTimer=null;
function autoRecompute(){
  updateMasterCheckbox();
  clearTimeout(recomputeTimer);
  recomputeTimer=setTimeout(()=>{
    if(regressionOn) computeRegression();
    else showPointsOnly();
  },350);
}

function toggleAll(checked){
  const tb=document.getElementById('tbody');
  for(let i=0;i<tb.rows.length;i++){
    const cb=tb.rows[i].cells[1].querySelector('input[type="checkbox"]');
    if(cb) cb.checked=checked;
  }
  clearTimeout(recomputeTimer);
  recomputeTimer=setTimeout(computeRegression,350);
}

function updateMasterCheckbox(){
  const tb=document.getElementById('tbody');
  const cbs=[...tb.querySelectorAll('input[type="checkbox"]')];
  if(!cbs.length) return;
  const all=cbs.every(c=>c.checked);
  const none=cbs.every(c=>!c.checked);
  const master=document.getElementById('cb-all');
  if(master){ master.checked=all; master.indeterminate=!all&&!none; }
}

function toggleRegression(){
  if(!regressionOn){
    regressionOn=true;
    recomputeKeepVis();
  } else {
    regressionOn=false;
    const _br=document.getElementById('btn-regrese'); if(_br){_br.style.color='var(--text)';_br.style.opacity='.6';_br.title='Spustit analýzu';}
    document.getElementById('resEq').textContent='—'; document.getElementById('eq-general').style.display='';
    document.getElementById('resParams').textContent='';
    lastResult=null;
    // Zachovej viditelnost bodů
    const vis=chartInst?chartInst.data.datasets.map((_,i)=>chartInst.isDatasetVisible(i)):[];
    showPointsOnly();
    if(chartInst) vis.forEach((v,i)=>{ if(!v) chartInst.hide(i); });
    if(chartInst) chartInst.update();
  }
}

function showPointsOnly(){
  const {x,y,excl}=getTableData();
  const allX=[...x,...excl.map(p=>p[0])];
  if(!allX.length){ clearChart(); return; }

  if(chartInst){chartInst.destroy();chartInst=null;}
  const c=chartColors();
  const datasets=[];

  if(excl.length>0) datasets.push({
    type:'scatter',label:`Vyloučeno (${excl.length})`,
    data:excl.map(p=>({x:p[0],y:p[1]})),
    backgroundColor:'transparent',borderColor:'#4a9eff',
    pointStyle:'circle',pointRadius:6,pointBorderWidth:2,order:1
  });

  if(x.length>0) datasets.push({
    type:'scatter',label:'Data',
    data:x.map((xi,i)=>({x:xi,y:y[i]})),
    backgroundColor:'#4a9eff',borderColor:'rgba(255,255,255,.7)',
    borderWidth:1.5,pointRadius:6,order:2
  });

  const ctx=document.getElementById('myChart').getContext('2d');
  chartInst=new Chart(ctx,{
    type:'scatter',data:{datasets},
    options:{
      responsive:true,maintainAspectRatio:false,animation:{duration:200},
      scales:{
        x:{type:'linear',grid:{color:c.grid},ticks:{color:c.tick,font:{family:'Fira Code',size:11}},border:{color:c.axis},title:{display:true,text:axisLabels.x,color:c.tick,font:{family:'Sora',size:12}}},
        y:{type:'linear',grid:{color:c.grid},ticks:{color:c.tick,font:{family:'Fira Code',size:11}},border:{color:c.axis},title:{display:true,text:axisLabels.y,color:c.tick,font:{family:'Sora',size:12}}}
      },
      plugins:{
        legend:{labels:{color:c.tick,usePointStyle:true,font:{family:'Sora',size:11},boxWidth:10,padding:14}},
        tooltip:{callbacks:{label:ctx=>{const d=ctx.raw;return ` (${d.x}, ${typeof d.y==='number'?d.y.toPrecision(6):d.y})`;}}},
      }
    },
    plugins:[{id:'bgFill',beforeDraw(chart){const{ctx:c2,chartArea}=chart;if(!chartArea)return;c2.save();c2.fillStyle=isDark?'#1c1c24':'#fafafa';c2.fillRect(chartArea.left,chartArea.top,chartArea.width,chartArea.height);c2.restore();}}]
  });
}

function computeRegression(){
  const {x,y,excl}=getTableData();
  const eqEl=document.getElementById('resEq');
  const pmEl=document.getElementById('resParams');

  if(x.length<2){
    eqEl.innerHTML='<span class="err">❗ Zadejte alespoň 2 zaškrtnuté body.</span>';
    pmEl.innerHTML='';
    showPointsOnly();
    return;
  }

  const type=document.getElementById('rType').value;
  let result;
  try{
    if(type==='linear')           result=doLinear(x,y);
    else if(type==='exponential') result=doExponential(x,y);
    else if(type==='polynomial')  result=doPolynomial(x,y);
    else if(type==='logarithmic') result=doLogarithmic(x,y);
    else if(type==='gaussian')    result=doGaussian(x,y);
    else if(type==='gaussian2')   result=doMultiGaussian(x,y,2);
    else if(type==='gaussian3')   result=doMultiGaussian(x,y,3);
  }catch(err){
    eqEl.innerHTML=`<span class="err">❗ ${err.message}</span>`;
    pmEl.innerHTML='';
    return;
  }

  displayResults(result, x.length, x.length+excl.length);
  lastResult=result; lastData={x,y,excl};
  const _br2=document.getElementById('btn-regrese'); if(_br2){_br2.style.color='var(--accent)';_br2.style.opacity='1';_br2.title='Skrýt regresi';}
  updateChart(result, x, y, excl);
}

/* ══════════════════════════════════════════════
   DISPLAY RESULTS
══════════════════════════════════════════════ */
function displayResults(r, used, total){
  document.getElementById('resEq').textContent=r.eq;
  // Zobraz obecný předpis šedě nad fitovaným
  const elGen=document.getElementById('eq-general');
  if(elGen) elGen.style.display='';
  let html='';
  if(r.type==='gaussian'){
    html+=`• A = (${f6(r.a)} ± ${f6(r.seA)})<br>`
         +`• μ = (${f6(r.b)} ± ${f6(r.seB)})<br>`
         +`• σ = (${f6(r.c)} ± ${f6(r.seC)})<br>`
         +`• FWHM = (${f6(r.FWHM)} ± ${f6(r.seFWHM)})<br>`
         +`• c = (${f6(r.d)} ± ${f6(r.seD)})<br>`;
  } else if(r.type==='gaussian2'||r.type==='gaussian3'){
    for(let k=0;k<r.nPeaks;k++){
      const A=r.params[k*3], mu=r.params[k*3+1], sig=r.params[k*3+2];
      const seA=r.se[k*3], seMu=r.se[k*3+1], seSig=r.se[k*3+2];
      html+=`<b>Peak ${k+1}:</b><br>`
           +`• A${k+1} = (${f6(A)} ± ${f6(seA)})<br>`
           +`• μ${k+1} = (${f6(mu)} ± ${f6(seMu)})<br>`
           +`• σ${k+1} = (${f6(sig)} ± ${f6(seSig)})<br>`
           +`• FWHM${k+1} = (${f6(r.FWHMs[k].FWHM)} ± ${f6(r.FWHMs[k].seFWHM)})<br>`;
    }
    html+=`• c = (${f6(r.params[r.params.length-1])} ± ${f6(r.se[r.se.length-1])})<br>`;
  } else {
    html+=`• a = (${f6(r.a)} ± ${f6(r.seA)})<br>`
         +`• b = (${f6(r.b)} ± ${f6(r.seB)})<br>`;
    if(r.type==='polynomial')
      html+=`• c = (${f6(r.c)} ± ${f6(r.seC)})<br>`;
  }
  html+=`• R² = <span class="r2">${r.r2.toFixed(6)}</span><br>`
       +`• Použito bodů: ${used} / ${total}`;
  document.getElementById('resParams').innerHTML=html;
}

   CHART
══════════════════════════════════════════════ */
function chartColors(){
  return isDark
    ? {bg:'#1c1c24',grid:'rgba(255,255,255,.08)',tick:'#a0a0b8',axis:'#505068'}
    : {bg:'#fafafa', grid:'rgba(0,0,0,.07)',     tick:'#444456',axis:'#ccccd8'};
}

function clearChart(){
  if(chartInst){chartInst.destroy();chartInst=null;}
  const c=chartColors();
  const canvas=document.getElementById('myChart');
  const ctx=canvas.getContext('2d');
  ctx.fillStyle=c.bg;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

function updateChart(result, x, y, excl){
  if(chartInst){chartInst.destroy();chartInst=null;}

  const xMin=Math.min(...x), xMax=Math.max(...x);
  const step=(xMax-xMin)/399||1;
  const xSmooth=Array.from({length:400},(_,i)=>xMin+i*step);
  let ySmooth;
  try{ ySmooth=xSmooth.map(result.smooth); }
  catch(e){ ySmooth=xSmooth.map(()=>NaN); }

  // Výpočet intervalu spolehlivosti
  let ciUpper=null, ciLower=null;
  if(showCI && result.yp){
    const n=x.length;
    const p = result.type==='polynomial'?3 : result.type==='gaussian'?4 :
              result.type==='gaussian2'?7 : result.type==='gaussian3'?10 : 2;
    const rmse=Math.sqrt(result.yp.reduce((s,ypi,i)=>s+(y[i]-ypi)**2,0)/Math.max(n-p,1));
    // t kritická hodnota 95% — aproximace pro velká n → 1.96, pro malá přesnější
    const tCrit = n>30 ? 1.96 : n>10 ? 2.228 : 2.776;

    if(result.type==='linear'){
      // Přesný vzorec pro lineární regresi
      const xMean=x.reduce((s,v)=>s+v,0)/n;
      const Sxx=x.reduce((s,v)=>s+(v-xMean)**2,0);
      ciUpper=xSmooth.map((xi,i)=>({x:xi,y:ySmooth[i]+tCrit*rmse*Math.sqrt(1/n+((xi-xMean)**2)/Sxx)}));
      ciLower=xSmooth.map((xi,i)=>({x:xi,y:ySmooth[i]-tCrit*rmse*Math.sqrt(1/n+((xi-xMean)**2)/Sxx)}));
    } else {
      // Přibližný uniformní pás pro nelineární regrese
      ciUpper=xSmooth.map((xi,i)=>({x:xi,y:ySmooth[i]+tCrit*rmse}));
      ciLower=xSmooth.map((xi,i)=>({x:xi,y:ySmooth[i]-tCrit*rmse}));
    }
  }

  const c=chartColors();
  const datasets=[];

  if(excl.length>0){
    datasets.push({
      type:'scatter',label:`Vyloučeno (${excl.length})`,
      data:excl.map(p=>({x:p[0],y:p[1]})),
      backgroundColor:'transparent',borderColor:'#4a9eff',
      pointStyle:'circle',pointRadius:6,pointBorderWidth:2,order:1
    });
  }

  datasets.push({
    type:'scatter',label:'Data',
    data:x.map((xi,i)=>({x:xi,y:y[i]})),
    backgroundColor:'#4a9eff',borderColor:'rgba(255,255,255,.7)',
    borderWidth:1.5,pointRadius:6,order:2
  });

  datasets.push({
    type:'line',label:result.eqShort||result.eq,
    data:xSmooth.map((xi,i)=>({x:xi,y:ySmooth[i]})),
    borderColor:'#ff6b6b',borderWidth:2.5,
    pointRadius:0,fill:false,tension:0,order:3
  });

  if(ciUpper&&ciLower){
    datasets.push({
      type:'line',label:'IS 95 %',
      data:ciUpper,
      borderColor:'rgba(255,107,107,0.4)',
      backgroundColor:'rgba(255,107,107,0.18)',
      borderWidth:1,borderDash:[4,3],
      pointRadius:0,fill:'+1',tension:0,order:4,
      pointStyle:'rect'
    });
    datasets.push({
      type:'line',label:'_ciLower',
      data:ciLower,
      borderColor:'rgba(255,107,107,0.4)',
      backgroundColor:'rgba(255,107,107,0.18)',
      borderWidth:1,borderDash:[4,3],
      pointRadius:0,fill:false,tension:0,order:5
    });
  }

  const ctx=document.getElementById('myChart').getContext('2d');
  chartInst=new Chart(ctx,{
    type:'scatter',
    data:{datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      animation:{duration:300},
      scales:{
        x:{type:'linear',
           grid:{color:c.grid},
           ticks:{color:c.tick,font:{family:'Fira Code',size:11}},
           border:{color:c.axis},
           title:{display:true,text:axisLabels.x,color:c.tick,font:{family:'Sora',size:12}}},
        y:{type:'linear',
           grid:{color:c.grid},
           ticks:{color:c.tick,font:{family:'Fira Code',size:11}},
           border:{color:c.axis},
           title:{display:true,text:axisLabels.y,color:c.tick,font:{family:'Sora',size:12}}}
      },
      plugins:{
        legend:{
          labels:{color:c.tick,usePointStyle:true,
                  font:{family:'Sora',size:11},boxWidth:10,padding:14,
                  filter:item=>item.text!=='_ciLower'},
          onClick(e, legendItem, legend){
            const chart=legend.chart;
            const idx=legendItem.datasetIndex;
            const label=chart.data.datasets[idx]?.label;
            // Pokud klikneme na CI, schováme/zobrazíme oba CI datasety
            if(label==='IS 95 %'){
              const ciIdx=chart.data.datasets.findIndex(d=>d.label==='IS 95 %');
              const ciLowIdx=chart.data.datasets.findIndex(d=>d.label==='_ciLower');
              const vis=chart.isDatasetVisible(ciIdx);
              if(vis){ chart.hide(ciIdx); if(ciLowIdx>=0) chart.hide(ciLowIdx); }
              else   { chart.show(ciIdx); if(ciLowIdx>=0) chart.show(ciLowIdx); }
            } else {
              // Standardní chování pro ostatní datasety
              if(chart.isDatasetVisible(idx)) chart.hide(idx);
              else chart.show(idx);
            }
          }
        },
        tooltip:{
          callbacks:{
            label:ctx=>{
              const d=ctx.raw;
              return ` (${d.x}, ${typeof d.y==='number'?d.y.toPrecision(6):d.y})`;
            }
          }
        }
      },
      backgroundColor:c.bg
    },
    plugins:[{
      id:'bgFill',
      beforeDraw(chart){
        const{ctx:c2,chartArea}=chart;
        if(!chartArea) return;
        c2.save();
        c2.fillStyle=isDark?'#1c1c24':'#fafafa';
        c2.fillRect(chartArea.left,chartArea.top,chartArea.width,chartArea.height);
        c2.restore();
      }
    }]
  });
}

/* ══════════════════════════════════════════════
   FILE IMPORT
══════════════════════════════════════════════ */
function loadFile(input){
  const file=input.files[0];
  if(!file) return;
  input.value='';
  const reader=new FileReader();
  reader.onload=e=>{ parseAndFill(e.target.result); };
  reader.readAsText(file);
}

function parseAndFill(text){
  const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'));
  if(!lines.length) return;

  function splitLine(line){
    if(line.includes('\t'))  return line.split('\t').map(s=>s.trim());
    if(line.includes(';'))   return line.split(';').map(s=>s.trim());
    if(line.includes(','))   return line.split(',').map(s=>s.trim());
    return line.split(/\s+/).filter(s=>s!=='');
  }

  let headerX='x', headerY='y', dataStart=0;
  const firstParts=splitLine(lines[0]);
  if(firstParts.length>=2 && (isNaN(firstParts[0].replace(',','.')) || isNaN(firstParts[1].replace(',','.')))){
    headerX=firstParts[0]||'x';
    headerY=firstParts[1]||'y';
    dataStart=1;
  }
  axisLabels={x:headerX, y:headerY};
  axisLabelsFromFile = (dataStart === 1);
  const lx=document.getElementById('label-x'), ly=document.getElementById('label-y');
  if(lx) lx.value=axisLabels.x;
  if(ly) ly.value=axisLabels.y;

  const rows=[];
  for(let i=dataStart;i<lines.length;i++){
    const parts=splitLine(lines[i]);
    if(parts.length<2) continue;
    const xv=parseFloat(parts[0].replace(',','.'));
    const yv=parseFloat(parts[1].replace(',','.'));
    if(!isNaN(xv)&&!isNaN(yv)) rows.push([xv,yv]);
  }
  if(!rows.length){ alert('Nepodařilo se načíst žádná data.'); return; }

  const tb=document.getElementById('tbody');
  tb.innerHTML='';
  regressionOn=false;
  const _br=document.getElementById('btn-regrese'); if(_br){_br.style.color='var(--text)';_br.style.opacity='.6';_br.title='Spustit analýzu';}
  document.getElementById('resEq').textContent='—'; document.getElementById('eq-general').style.display='';
  document.getElementById('resParams').textContent='';

  rows.forEach(([xv,yv],i)=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td class="row-num">${i+1}</td>
      <td><input type="checkbox" checked onchange="autoRecompute()"></td>
      <td><input class="cell" type="text" value="${xv}" data-r="${i}" data-c="x"
                 onkeydown="handleKey(event,${i},'x')" oninput="autoRecompute()"></td>
      <td><input class="cell" type="text" value="${yv}" data-r="${i}" data-c="y"
                 onkeydown="handleKey(event,${i},'y')" oninput="autoRecompute()"></td>`;
    tb.appendChild(tr);
  });
  addRow();
  updateMasterCheckbox();
  showPointsOnly();
  document.getElementById('resEq').innerHTML=
    `<span style="color:var(--success)">✅ Načteno ${rows.length} bodů${dataStart?` · osy: ${headerX}, ${headerY}`:''}</span>`;
}

   RECTANGLE SELECTION
══════════════════════════════════════════════ */
let selectMode=false;
let selStart=null, selRect=null;

function toggleSelectMode(){
  selectMode=!selectMode;
  const btn=document.getElementById('btn-select');
  const overlay=document.getElementById('sel-overlay');
  if(selectMode){
    btn.style.opacity='1';
    btn.style.color='var(--accent)';
    btn.title='Zrušit výběr';
    const tb=document.getElementById('tbody');
    tb.querySelectorAll('input[type="checkbox"]').forEach(cb=>cb.checked=false);
    updateMasterCheckbox();
    recomputeKeepVis();
  } else {
    exitSelectMode();
  }
}

function exitSelectMode(){
  selectMode=false;
  const btn=document.getElementById('btn-select');
  btn.style.opacity='.6';
  btn.style.color='var(--text)';
  btn.title='Vybrat oblast';
  overlay.classList.remove('active');
  const r=overlay.querySelector('.sel-rect');
  if(r) r.remove();
  selStart=null; selRect=null;
}

function getOverlayPos(e, overlay){
  const rect=overlay.getBoundingClientRect();
  return {x:e.clientX-rect.left, y:e.clientY-rect.top};
}

document.addEventListener('DOMContentLoaded',()=>{
  const overlay=document.getElementById('sel-overlay');

  overlay.addEventListener('mousedown',e=>{
    if(!selectMode) return;
    selStart=getOverlayPos(e,overlay);
    const r=document.createElement('div');
    r.className='sel-rect';
    r.style.left=selStart.x+'px'; r.style.top=selStart.y+'px';
    r.style.width='0'; r.style.height='0';
    overlay.appendChild(r);
    selRect=r;
    e.preventDefault();
  });

  overlay.addEventListener('mousemove',e=>{
    if(!selectMode||!selStart||!selRect) return;
    const pos=getOverlayPos(e,overlay);
    const x=Math.min(pos.x,selStart.x), y=Math.min(pos.y,selStart.y);
    const w=Math.abs(pos.x-selStart.x), h=Math.abs(pos.y-selStart.y);
    selRect.style.left=x+'px'; selRect.style.top=y+'px';
    selRect.style.width=w+'px'; selRect.style.height=h+'px';
    e.preventDefault();
  });

  overlay.addEventListener('mouseup',e=>{
    if(!selectMode||!selStart||!selRect||!chartInst) return;
    const pos=getOverlayPos(e,overlay);
    const px1=Math.min(selStart.x,pos.x), px2=Math.max(selStart.x,pos.x);
    const py1=Math.min(selStart.y,pos.y), py2=Math.max(selStart.y,pos.y);
    const xScale=chartInst.scales.x, yScale=chartInst.scales.y;
    const dxMin=xScale.getValueForPixel(px1), dxMax=xScale.getValueForPixel(px2);
    const dyMin=yScale.getValueForPixel(py2), dyMax=yScale.getValueForPixel(py1);
    const tb=document.getElementById('tbody');
    for(let i=0;i<tb.rows.length;i++){
      const xv=parseFloat(tb.rows[i].cells[2]?.querySelector('input')?.value?.replace(',','.'));
      const yv=parseFloat(tb.rows[i].cells[3]?.querySelector('input')?.value?.replace(',','.'));
      if(!isNaN(xv)&&!isNaN(yv) && xv>=dxMin&&xv<=dxMax && yv>=dyMin&&yv<=dyMax){
        const cb=tb.rows[i].cells[1]?.querySelector('input[type="checkbox"]');
        if(cb) cb.checked=true;
      }
    }
    selRect.remove(); selRect=null; selStart=null;
    exitSelectMode();
    updateMasterCheckbox();
    recomputeKeepVis();
  });
});

function saveGraphSVG(){
  const {x,y,excl}=lastData, result=lastResult;
  const visibility=chartInst?chartInst.data.datasets.map((_,i)=>chartInst.isDatasetVisible(i)):[];

  const W=900,H=600,ml=60,mr=30,mt=20,mb=60;
  const pw=W-ml-mr, ph=H-mt-mb;

  const allXvals=[...x,...excl.map(p=>p[0])];
  const allYvals=[...y,...excl.map(p=>p[1])];
  // Použij rozsahy přímo z živého grafu — stejné jako co vidí uživatel
  const xMin=chartInst.scales.x.min, xMax=chartInst.scales.x.max;
  const yMin=chartInst.scales.y.min, yMax=chartInst.scales.y.max;
  // Křivka jen přes zahrnuté body
  const xSmoothMin=Math.min(...x), xSmoothMax=Math.max(...x);
  const step=(xSmoothMax-xSmoothMin)/399||1;
  const xSmooth=Array.from({length:400},(_,i)=>xSmoothMin+i*step);
  let ySmooth;
  try{ySmooth=xSmooth.map(result.smooth);}catch(e){ySmooth=xSmooth.map(()=>NaN);}
  const yRange=yMax-yMin||1, xRange=xMax-xMin||1;

  const px=v=>ml+(v-xMin)/xRange*pw;
  const py=v=>mt+ph-(v-yMin)/yRange*ph;

  // Build dataset list matching live chart order
  const datasets=[];
  if(excl.length>0) datasets.push({type:'excl',pts:excl});
  datasets.push({type:'data',pts:x.map((xi,i)=>[xi,y[i]])});
  datasets.push({type:'line',pts:xSmooth.map((xi,i)=>[xi,ySmooth[i]])});

  // CI pro SVG — zobraz jen pokud je showCI zapnuté A dataset je viditelný v živém grafu
  const ciDatasetIdx=chartInst?chartInst.data.datasets.findIndex(d=>d.label==='IS 95 %'):-1;
  const ciVisible=showCI && ciDatasetIdx>=0 && chartInst.isDatasetVisible(ciDatasetIdx);
  let ciSVG=null;
  if(ciVisible && result.yp){
    const n=x.length;
    const p=result.type==='polynomial'?3:result.type==='gaussian'?4:result.type==='gaussian2'?7:result.type==='gaussian3'?10:2;
    const rmse=Math.sqrt(result.yp.reduce((s,ypi,i)=>s+(y[i]-ypi)**2,0)/Math.max(n-p,1));
    const tCrit=n>30?1.96:n>10?2.228:2.776;
    let upper,lower;
    if(result.type==='linear'){
      const xMean=x.reduce((s,v)=>s+v,0)/n;
      const Sxx=x.reduce((s,v)=>s+(v-xMean)**2,0);
      upper=xSmooth.map((xi,i)=>[xi,ySmooth[i]+tCrit*rmse*Math.sqrt(1/n+((xi-xMean)**2)/Sxx)]);
      lower=xSmooth.map((xi,i)=>[xi,ySmooth[i]-tCrit*rmse*Math.sqrt(1/n+((xi-xMean)**2)/Sxx)]);
    } else {
      upper=xSmooth.map((xi,i)=>[xi,ySmooth[i]+tCrit*rmse]);
      lower=xSmooth.map((xi,i)=>[xi,ySmooth[i]-tCrit*rmse]);
    }
    ciSVG={upper,lower};
  }

  let svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" font-family="'Sora',sans-serif">`;
  svg+=`<rect width="${W}" height="${H}" fill="#ffffff"/>`;
  svg+=`<rect x="${ml}" y="${mt}" width="${pw}" height="${ph}" fill="#fafafa"/>`;

  // Grid lines (5 each)
  for(let i=0;i<=5;i++){
    const gy=mt+i*ph/5;
    const gx=ml+i*pw/5;
    svg+=`<line x1="${ml}" y1="${gy}" x2="${ml+pw}" y2="${gy}" stroke="rgba(0,0,0,0.07)" stroke-width="1"/>`;
    svg+=`<line x1="${gx}" y1="${mt}" x2="${gx}" y2="${mt+ph}" stroke="rgba(0,0,0,0.07)" stroke-width="1"/>`;
    // Tick labels
    const yVal=(yMin+((5-i)/5)*yRange).toPrecision(4);
    const xVal=(xMin+(i/5)*xRange).toPrecision(4);
    svg+=`<text x="${ml-6}" y="${gy+4}" text-anchor="end" font-size="11" fill="#444456" font-family="'Fira Code',monospace">${yVal}</text>`;
    svg+=`<text x="${gx}" y="${mt+ph+16}" text-anchor="middle" font-size="11" fill="#444456" font-family="'Fira Code',monospace">${xVal}</text>`;
  }

  // Axes
  svg+=`<line x1="${ml}" y1="${mt}" x2="${ml}" y2="${mt+ph}" stroke="#cccccc" stroke-width="1.5"/>`;
  svg+=`<line x1="${ml}" y1="${mt+ph}" x2="${ml+pw}" y2="${mt+ph}" stroke="#cccccc" stroke-width="1.5"/>`;

  // Axis labels
  svg+=`<text x="${ml+pw/2}" y="${H-8}" text-anchor="middle" font-size="12" fill="#444456">${axisLabels.x}</text>`;
  svg+=`<text x="14" y="${mt+ph/2}" text-anchor="middle" font-size="12" fill="#444456" transform="rotate(-90,14,${mt+ph/2})">${axisLabels.y}</text>`;

  // Datasets
  // Nejdřív CI pás (pod křivkou)
  if(ciSVG){
    // Ořízni body na oblast grafu
    const clip=([xi,yi])=>[
      Math.max(ml, Math.min(ml+pw, px(xi))),
      Math.max(mt, Math.min(mt+ph, py(yi)))
    ];
    const uPts=ciSVG.upper.filter(p=>isFinite(p[1])).map(clip);
    const lPts=ciSVG.lower.filter(p=>isFinite(p[1])).map(clip).reverse();
    if(uPts.length>1){
      const poly=[...uPts,...lPts].map(p=>`${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
      svg+=`<polygon points="${poly}" fill="rgba(200,50,50,0.12)"/>`;
      const du=uPts.map((p,j)=>`${j===0?'M':'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
      const dl=lPts.slice().reverse().map((p,j)=>`${j===0?'M':'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
      svg+=`<path d="${du}" fill="none" stroke="rgba(200,50,50,0.4)" stroke-width="1" stroke-dasharray="4,3"/>`;
      svg+=`<path d="${dl}" fill="none" stroke="rgba(200,50,50,0.4)" stroke-width="1" stroke-dasharray="4,3"/>`;
    }
  }

  datasets.forEach((ds,i)=>{
    if(visibility.length>i && !visibility[i]) return;
    if(ds.type==='line'){
      const pts=ds.pts.filter(p=>isFinite(p[1]));
      if(!pts.length) return;
      const d=pts.map((p,j)=>`${j===0?'M':'L'}${px(p[0]).toFixed(1)},${py(p[1]).toFixed(1)}`).join(' ');
      svg+=`<path d="${d}" fill="none" stroke="#cc3030" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
    } else if(ds.type==='data'){
      ds.pts.forEach(([xi,yi])=>{
        svg+=`<circle cx="${px(xi).toFixed(1)}" cy="${py(yi).toFixed(1)}" r="6" fill="#2264c0" stroke="rgba(0,0,0,0.25)" stroke-width="1.5"/>`;
      });
    } else if(ds.type==='excl'){
      ds.pts.forEach(([xi,yi])=>{
        svg+=`<circle cx="${px(xi).toFixed(1)}" cy="${py(yi).toFixed(1)}" r="6" fill="none" stroke="#2264c0" stroke-width="2"/>`;
      });
    }
  });

  // Legend — čti přímo z živého grafu pro konzistenci
  const legendItems=[];
  if(chartInst){
    chartInst.data.datasets.forEach((ds,i)=>{
      if(ds.label==='_ciLower') return; // přeskočit
      if(!chartInst.isDatasetVisible(i)) return; // přeskočit skryté
      if(ds.label==='IS 95 %'){
        legendItems.push({label:'IS 95 %', ci:true});
      } else if(ds.type==='line'){
        legendItems.push({label:'fit', color:'#cc3030', line:true});
      } else if(ds.backgroundColor==='transparent'||ds.backgroundColor==='rgba(255,80,80,.5)'){
        legendItems.push({label:ds.label, color:'#2264c0', hollow:true});
      } else {
        legendItems.push({label:ds.label, color:'#2264c0', hollow:false});
      }
    });
  }

  // Vypočítej celkovou šířku legendy a případně rozlož na dva řádky
  const itemW=item=>item.label.length*6.5+40;
  const totalW=legendItems.reduce((s,it)=>s+itemW(it),0);

  // Pokud se vše vejde na jeden řádek, klasicky zleva; jinak IS 95 % vpravo
  const ciItem=legendItems.find(it=>it.ci);
  const mainItems=legendItems.filter(it=>!it.ci);

  const drawLegendItem=(item,lx,ly)=>{
    if(item.ci){
      svg+=`<rect x="${lx}" y="${ly-5}" width="20" height="10" fill="rgba(200,50,50,0.12)" stroke="rgba(200,50,50,0.4)" stroke-width="1" stroke-dasharray="4,2"/>`;
    } else if(item.line){
      svg+=`<line x1="${lx}" y1="${ly}" x2="${lx+20}" y2="${ly}" stroke="${item.color}" stroke-width="2.5"/>`;
    } else if(item.hollow){
      svg+=`<circle cx="${lx+7}" cy="${ly}" r="5" fill="none" stroke="${item.color}" stroke-width="2"/>`;
    } else {
      svg+=`<circle cx="${lx+7}" cy="${ly}" r="5" fill="${item.color}"/>`;
    }
    svg+=`<text x="${lx+24}" y="${ly+4}" font-size="11" fill="#444456">${item.label}</text>`;
  };

  // Hlavní položky zleva
  let lx=ml+10;
  mainItems.forEach(item=>{ drawLegendItem(item,lx,mt+10); lx+=itemW(item); });

  // IS 95 % vpravo (pokud existuje)
  if(ciItem){
    const ciW=itemW(ciItem);
    drawLegendItem(ciItem, ml+pw-ciW+4, mt+10);
  }

  svg+=`</svg>`;

  const a=document.createElement('a');
  a.href='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
  a.download='regrese.svg';
  a.click();
}

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
applyTheme(false);
initTable();
updateGeneralEq();
</script>
