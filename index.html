<!DOCTYPE html>
<html lang="cs" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regrese – Analýza dat</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#18181c;--surface:#22222a;--surface2:#2a2a33;
  --border:#383844;--text:#e8e8f0;--text-muted:#7070880;
  --accent:#4a9eff;--danger:#ff6060;--danger-h:#ff7c7c;
  --success:#4cde8c;--btn:#2a2a33;--btn-h:#34343e;
  --chart:#1c1c24;--shadow:0 4px 20px rgba(0,0,0,.5);
  --muted:#7070880; /* fix typo below */
}
[data-theme="dark"]{
  --text-muted:#70708a;
}
[data-theme="light"]{
  --bg:#f0f0f5;--surface:#ffffff;--surface2:#f5f5fa;
  --border:#dcdce8;--text:#18181c;--text-muted:#666675;
  --accent:#2060c0;--danger:#c83030;--danger-h:#b82020;
  --success:#1a8840;--btn:#ffffff;--btn-h:#ebebf2;
  --chart:#fafafa;--shadow:0 4px 20px rgba(0,0,0,.12);
}

body{
  font-family:'Sora',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;transition:background .3s,color .3s;
}

.app{display:flex;flex-direction:column;height:100vh;padding:14px;gap:10px;}

/* ── topbar ── */
.topbar{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:10px 16px;
  box-shadow:var(--shadow);
}
.app-title{font-size:17px;font-weight:700;white-space:nowrap;}
.app-title span{color:var(--accent);}

select#rType{
  flex:1;max-width:310px;
  background:var(--btn);color:var(--text);
  border:1px solid var(--border);border-radius:8px;
  padding:6px 10px;font-family:'Sora',sans-serif;font-size:13.5px;
  cursor:pointer;outline:none;transition:border-color .2s;
  appearance:auto;
}
select#rType:focus{border-color:var(--accent);}

.tbtn{
  background:var(--btn);color:var(--text);
  border:1px solid var(--border);border-radius:8px;
  padding:6px 14px;font-family:'Sora',sans-serif;font-size:13px;
  cursor:pointer;transition:background .15s;white-space:nowrap;outline:none;
}
.tbtn:hover{background:var(--btn-h);}
.spacer{flex:1;}

/* ── main ── */
.main{display:flex;gap:14px;flex:1;min-height:0;}

/* ── left panel ── */
.left{display:flex;flex-direction:column;gap:8px;width:305px;flex-shrink:0;}

.sec-label{
  font-size:11px;font-weight:600;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:.07em;padding-left:2px;
}

.tbl-wrap{
  flex:1;overflow-y:auto;border-radius:10px;
  border:1px solid var(--border);background:var(--surface);
  min-height:140px;
}
table{width:100%;border-collapse:collapse;}
thead th{
  position:sticky;top:0;z-index:1;
  background:var(--surface2);color:var(--text-muted);
  font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;
  padding:7px 8px;border-bottom:1px solid var(--border);text-align:center;
}
thead th:nth-child(1){width:32px;}
thead th:nth-child(2){width:46px;}
thead th:nth-child(3),thead th:nth-child(4){width:calc((100% - 78px)/2);}
tbody tr{border-bottom:1px solid var(--border);}
tbody tr:last-child{border-bottom:none;}
tbody tr:nth-child(even){background:var(--surface2);}
tbody tr:hover{background:var(--btn-h);}
td{padding:3px 5px;text-align:center;vertical-align:middle;}
td.row-num{font-family:'Fira Code',monospace;font-size:11px;color:var(--text-muted);user-select:none;}
td input[type="checkbox"]{
  width:16px;height:16px;accent-color:var(--accent);cursor:pointer;
}
td input.cell{
  width:100%;background:transparent;color:var(--text);
  border:none;outline:none;
  font-family:'Fira Code',monospace;font-size:12.5px;
  text-align:right;padding:5px 6px;border-radius:4px;transition:background .12s;
}
td input.cell:focus{
  background:var(--btn-h);
  outline:1.5px solid var(--accent);outline-offset:-1.5px;
}

/* ── buttons ── */
.btns{display:flex;flex-direction:column;gap:5px;}
.btn{
  border:1px solid var(--border);border-radius:8px;
  padding:7px 12px;font-family:'Sora',sans-serif;font-size:13.5px;
  cursor:pointer;transition:all .15s;outline:none;
}
.btn-primary{
  background:var(--danger);border-color:var(--danger);
  color:#fff;font-weight:700;font-size:14.5px;text-align:center;
}
.btn-primary:hover{background:var(--danger-h);border-color:var(--danger-h);}
.btn-sec{background:var(--btn);color:var(--text);}
.btn-sec:hover{background:var(--btn-h);}

/* ── results ── */
.results{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:11px 13px;font-size:13px;
  box-shadow:var(--shadow);
}
.res-eq{
  font-weight:600;font-size:13.5px;color:var(--accent);
  margin-bottom:7px;word-break:break-all;
}
.res-params{
  font-family:'Fira Code',monospace;font-size:11.5px;
  color:var(--text);line-height:1.85;
}
.r2{color:var(--success);font-weight:600;}
.err{color:var(--danger);}

/* ── chart ── */
.right{
  flex:1;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:14px;
  display:flex;align-items:stretch;justify-content:center;
  min-width:0;box-shadow:var(--shadow);
}
.chart-wrap{width:100%;height:100%;position:relative;}
.sel-overlay{
  position:absolute;inset:0;z-index:10;
  display:none;cursor:crosshair;
}
.sel-overlay.active{display:block;}
.sel-rect{
  position:absolute;
  border:2px solid var(--accent);
  background:rgba(74,158,255,.12);
  pointer-events:none;
}

/* ── scrollbar ── */
.tbl-wrap::-webkit-scrollbar{width:5px;}
.tbl-wrap::-webkit-scrollbar-track{background:transparent;}
.tbl-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

@media(max-width:760px){
  .app{height:auto;}
  .main{flex-direction:column;}
  .left{width:100%;}
  .right{min-height:320px;}
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="app-title">📊 <span>Regrese</span></div>
    <select id="rType" onchange="autoRecompute()">
      <option value="linear">Lineární (y = ax + b)</option>
      <option value="exponential">Exponenciální (y = a·e^(bx))</option>
      <option value="polynomial">Polynomiální 2° (y = ax² + bx + c)</option>
      <option value="logarithmic">Logaritmická (y = a·ln(x) + b)</option>
      <option value="gaussian">Gaussovská (y = A·e^(-(x-μ)²/2σ²) + c)</option>
    </select>
    <div class="spacer"></div>
    <select class="tbtn" id="themeSelect" onchange="setTheme(this.value)">
      <option value="system">🖥️ Systém</option>
      <option value="light">☀️ Světlý</option>
      <option value="dark">🌙 Tmavý</option>
    </select>
  </header>

  <div class="main">
    <div class="left">
      <div class="sec-label">Zadejte data (x, y):</div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>#</th><th><input type="checkbox" id="cb-all" checked onchange="toggleAll(this.checked)" title="Zaškrtnout/odškrtnout vše"></th><th>x</th><th>y</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <div class="btns">
        <button class="btn btn-primary" id="btn-regrese" onclick="toggleRegression()">📊 Regrese</button>
        <button class="btn btn-sec"     onclick="document.getElementById('file-input').click()">📂 Načíst soubor</button>
        <input type="file" id="file-input" accept=".txt,.csv,.tsv,.dat" style="display:none" onchange="loadFile(this)">
        <button class="btn btn-sec" id="btn-select" onclick="toggleSelectMode()">⬚ Vybrat oblast</button>
        <button class="btn btn-sec"     onclick="swapXY()">🔄 Prohodit x a y</button>
        <button class="btn btn-sec"     onclick="clearData()">🗑️ Smazat data</button>
        <button class="btn btn-sec"     onclick="saveGraph()">💾 Uložit graf jako JPG</button>
      </div>

      <div class="results">
        <div class="res-eq"     id="resEq">—</div>
        <div class="res-params" id="resParams"></div>
      </div>
    </div>

    <div class="right">
      <div class="chart-wrap">
        <canvas id="myChart"></canvas>
        <div class="sel-overlay" id="sel-overlay"></div>
      </div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
let chartInst  = null;
let isDark     = false;
let themeChoice = 'system';
let lastResult = null;
let lastData   = null;
let regressionOn = false;
let axisLabels = {x:'x', y:'y'};

const sysMQ = window.matchMedia('(prefers-color-scheme: dark)');
sysMQ.addEventListener('change', () => {
  if(themeChoice === 'system') applyTheme(true);
});

function applyTheme(rerender){
  isDark = themeChoice === 'system'
         ? sysMQ.matches
         : themeChoice === 'dark';
  document.documentElement.dataset.theme = isDark ? 'dark' : 'light';
  if(rerender && chartInst) computeRegression();
}

function setTheme(choice){
  themeChoice = choice;
  applyTheme(true);
}

/* ══════════════════════════════════════════════
   MATH UTILITIES
══════════════════════════════════════════════ */
const sum  = a => a.reduce((s,v)=>s+v,0);
const mean = a => sum(a)/a.length;

function calcR2(y, yp) {
  const ym = mean(y);
  const tot = sum(y.map(v=>(v-ym)**2));
  const res = sum(y.map((v,i)=>(v-yp[i])**2));
  return tot < 1e-14 ? 1 : 1 - res/tot;
}

function matT(A) {
  return A[0].map((_,j)=>A.map(r=>r[j]));
}

function matMul(A,B) {
  return A.map(row=>B[0].map((_,j)=>row.reduce((s,v,k)=>s+v*B[k][j],0)));
}

function inv2(M) {
  const det = M[0][0]*M[1][1] - M[0][1]*M[1][0];
  if(Math.abs(det)<1e-14) throw new Error("Singulární matice – body leží na přímce?");
  return [[ M[1][1]/det,-M[0][1]/det],
          [-M[1][0]/det, M[0][0]/det]];
}

function inv3(M) {
  const [a,b,c]=M[0],[d,e,f]=M[1],[g,h,k]=M[2];
  const det = a*(e*k-f*h) - b*(d*k-f*g) + c*(d*h-e*g);
  if(Math.abs(det)<1e-14) throw new Error("Singulární matice – zkuste jiný typ regrese.");
  return [[(e*k-f*h)/det,(c*h-b*k)/det,(b*f-c*e)/det],
          [(f*g-d*k)/det,(a*k-c*g)/det,(c*d-a*f)/det],
          [(d*h-e*g)/det,(b*g-a*h)/det,(a*e-b*d)/det]];
}

function calcSE(Xd, y, yp, p) {
  const n = y.length;
  const s2 = sum(y.map((v,i)=>(v-yp[i])**2)) / Math.max(n-p, 1);
  const Xt = matT(Xd);
  const XtX = matMul(Xt, Xd);
  const inv = p===2 ? inv2(XtX) : inv3(XtX);
  return inv.map((_,i) => Math.sqrt(Math.max(0, inv[i][i]*s2)));
}

// Simple linear regression; returns {a:slope, b:intercept}
function linRaw(x, y) {
  const Xd = x.map(xi=>[xi,1]);
  const Xt = matT(Xd);
  const XtX = matMul(Xt,Xd);
  const XtY = Xt.map(r=>sum(r.map((v,j)=>v*y[j])));
  const inv = inv2(XtX);
  const p = inv.map(r=>sum(r.map((v,j)=>v*XtY[j])));
  return {a:p[0], b:p[1]};
}

/* ══════════════════════════════════════════════
   REGRESSION FUNCTIONS
══════════════════════════════════════════════ */
function f6(v){return v>=0?v.toFixed(6):String(v.toFixed(6));}

function doLinear(x,y){
  const {a,b}=linRaw(x,y);
  const yp=x.map(xi=>a*xi+b);
  const r2=calcR2(y,yp);
  const Xd=x.map(xi=>[xi,1]);
  const [seA,seB]=calcSE(Xd,y,yp,2);
  return{type:'linear',a,b,seA,seB,r2,yp,
         eq:`y = ${f6(a)}x + ${f6(b)}`,
         smooth:xi=>a*xi+b};
}

function doExponential(x,y){
  if(y.some(v=>v<=0)) throw new Error("Exponenciální regrese vyžaduje všechny y > 0");
  const lnY=y.map(Math.log);
  const {a:bP, b:lnA}=linRaw(x,lnY);
  const a=Math.exp(lnA), b=bP;
  const yp=x.map(xi=>a*Math.exp(b*xi));
  const r2=calcR2(y,yp);
  const Xd=x.map(xi=>[xi,1]);
  const [seA,seB]=calcSE(Xd,y,yp,2);
  return{type:'exponential',a,b,seA,seB,r2,yp,
         eq:`y = ${f6(a)}·e^(${f6(b)}x)`,
         smooth:xi=>a*Math.exp(b*xi)};
}

function doPolynomial(x,y){
  if(x.length<3) throw new Error("Polynomiální regrese 2° vyžaduje alespoň 3 body.");
  const Xd=x.map(xi=>[xi*xi,xi,1]);
  const Xt=matT(Xd);
  const XtX=matMul(Xt,Xd);
  const XtY=Xt.map(r=>sum(r.map((v,j)=>v*y[j])));
  const inv=inv3(XtX);
  const [a,b,c]=inv.map(r=>sum(r.map((v,j)=>v*XtY[j])));
  const yp=x.map(xi=>a*xi*xi+b*xi+c);
  const r2=calcR2(y,yp);
  const [seA,seB,seC]=calcSE(Xd,y,yp,3);
  return{type:'polynomial',a,b,c,seA,seB,seC,r2,yp,
         eq:`y = ${f6(a)}x² + ${f6(b)}x + ${f6(c)}`,
         smooth:xi=>a*xi*xi+b*xi+c};
}

function doLogarithmic(x,y){
  if(x.some(v=>v<=0)) throw new Error("Logaritmická regrese vyžaduje všechny x > 0");
  const lnX=x.map(Math.log);
  const {a,b}=linRaw(lnX,y);
  const yp=x.map(xi=>a*Math.log(Math.max(xi,1e-10))+b);
  const r2=calcR2(y,yp);
  const Xd=x.map(xi=>[Math.log(Math.max(xi,1e-10)),1]);
  const [seA,seB]=calcSE(Xd,y,yp,2);
  return{type:'logarithmic',a,b,seA,seB,r2,yp,
         eq:`y = ${f6(a)}·ln(x) + ${f6(b)}`,
         smooth:xi=>a*Math.log(Math.max(xi,1e-10))+b};
}

/* ── Gauss-Jordan solver (pro LM) ── */
function solveGE(A,b){
  const n=b.length;
  const M=A.map((row,i)=>[...row,b[i]]);
  for(let col=0;col<n;col++){
    let maxRow=col;
    for(let row=col+1;row<n;row++) if(Math.abs(M[row][col])>Math.abs(M[maxRow][col])) maxRow=row;
    [M[col],M[maxRow]]=[M[maxRow],M[col]];
    if(Math.abs(M[col][col])<1e-14) continue;
    for(let row=0;row<n;row++){
      if(row===col) continue;
      const f=M[row][col]/M[col][col];
      for(let k=col;k<=n;k++) M[row][k]-=f*M[col][k];
    }
  }
  return M.map((row,i)=>row[n]/row[i]);
}

/* ── Levenberg-Marquardt ── */
function lmFit(xd,yd,p0,fn,jac,maxIter=400,tol=1e-10){
  let p=[...p0], lam=0.01;
  const res=p=>xd.map((xi,i)=>yd[i]-fn(xi,p));
  const sse=p=>res(p).reduce((s,r)=>s+r*r,0);
  for(let iter=0;iter<maxIter;iter++){
    const r=res(p);
    const J=xd.map(xi=>jac(xi,p));
    const m=p.length;
    const JtJ=Array.from({length:m},(_,a)=>Array.from({length:m},(_,b)=>J.reduce((s,j)=>s+j[a]*j[b],0)));
    const Jtr=Array.from({length:m},(_,a)=>J.reduce((s,j,i)=>s+j[a]*r[i],0));
    const Alam=JtJ.map((row,i)=>row.map((v,j)=>i===j?v*(1+lam):v));
    let dp; try{dp=solveGE(Alam,Jtr);}catch(e){break;}
    const pNew=p.map((v,i)=>v+dp[i]);
    if(sse(pNew)<sse(p)){
      p=pNew; lam=Math.max(lam/10,1e-8);
      if(Math.sqrt(dp.reduce((s,v)=>s+v*v,0))<tol) break;
    } else { lam=Math.min(lam*10,1e8); }
  }
  return p;
}

/* ── 4×4 matrix inverse (pro SE gaussovky) ── */
function inv4(A){
  const n=4;
  const M=A.map((row,i)=>[...row,...Array.from({length:n},(_,j)=>i===j?1:0)]);
  for(let col=0;col<n;col++){
    let maxRow=col;
    for(let row=col+1;row<n;row++) if(Math.abs(M[row][col])>Math.abs(M[maxRow][col])) maxRow=row;
    [M[col],M[maxRow]]=[M[maxRow],M[col]];
    if(Math.abs(M[col][col])<1e-14) return null;
    const sc=M[col][col];
    for(let k=0;k<2*n;k++) M[col][k]/=sc;
    for(let row=0;row<n;row++){
      if(row===col) continue;
      const f=M[row][col];
      for(let k=0;k<2*n;k++) M[row][k]-=f*M[col][k];
    }
  }
  return M.map(row=>row.slice(n));
}

function doGaussian(x,y){
  if(x.length<5) throw new Error("Gaussovský fit vyžaduje alespoň 5 bodů.");
  // Počáteční odhady
  const ymax=Math.max(...y), ymin=Math.min(...y);
  const A0=ymax-ymin;
  const mu0=x[y.indexOf(ymax)];
  const c0=ymin;
  // Odhad sigma z šířky v polovině maxima
  const half=c0+A0/2;
  const above=x.filter((_,i)=>y[i]>=half);
  const sig0=above.length>1?(Math.max(...above)-Math.min(...above))/2.355 : (Math.max(...x)-Math.min(...x))/6;

  const fn=(xi,[A,mu,sig,c])=>A*Math.exp(-((xi-mu)**2)/(2*sig**2))+c;
  const jac=(xi,[A,mu,sig,c])=>{
    const e=Math.exp(-((xi-mu)**2)/(2*sig**2));
    return[e, A*e*(xi-mu)/sig**2, A*e*(xi-mu)**2/sig**3, 1];
  };

  let [A,mu,sig,c]=lmFit(x,y,[A0,mu0,Math.abs(sig0),c0],fn,jac);
  sig=Math.abs(sig);
  const yp=x.map(xi=>fn(xi,[A,mu,sig,c]));
  const r2=calcR2(y,yp);

  // Standardní chyby přes kovariační matici
  const Jac=x.map(xi=>jac(xi,[A,mu,sig,c]));
  const m=4, n=x.length;
  const JtJ=Array.from({length:m},(_,a)=>Array.from({length:m},(_,b)=>Jac.reduce((s,j)=>s+j[a]*j[b],0)));
  const s2=yp.reduce((s,ypi,i)=>s+(y[i]-ypi)**2,0)/Math.max(n-m,1);
  const Cinv=inv4(JtJ);
  const se=Cinv?Cinv.map((row,i)=>Math.sqrt(Math.max(0,row[i]*s2))):[0,0,0,0];

  const FWHM=2*Math.sqrt(2*Math.log(2))*sig;
  const seFWHM=2*Math.sqrt(2*Math.log(2))*se[2];

  return{
    type:'gaussian', a:A, b:mu, c:sig, d:c,
    seA:se[0], seB:se[1], seC:se[2], seD:se[3],
    FWHM, seFWHM, r2, yp,
    eq:`y = ${f6(A)}·exp(-(x-${f6(mu)})²/(2·${f6(sig)}²)) + ${f6(c)}`,
    smooth:xi=>fn(xi,[A,mu,sig,c])
  };
}

/* ══════════════════════════════════════════════
   TABLE MANAGEMENT
══════════════════════════════════════════════ */
function addRow(){
  const tb=document.getElementById('tbody');
  const row=tb.rows.length;
  const tr=document.createElement('tr');
  tr.innerHTML=`
    <td class="row-num">${row+1}</td>
    <td><input type="checkbox" checked onchange="autoRecompute()"></td>
    <td><input class="cell" type="text" placeholder="" data-r="${row}" data-c="x"
               onkeydown="handleKey(event,${row},'x')" oninput="autoRecompute()"></td>
    <td><input class="cell" type="text" placeholder="" data-r="${row}" data-c="y"
               onkeydown="handleKey(event,${row},'y')" oninput="autoRecompute()"></td>`;
  tb.appendChild(tr);
}

function handleKey(e,row,col){
  if(e.key!=='Enter') return;
  e.preventDefault();
  if(col==='x'){
    focusCell(row,'y');
  } else {
    const tb=document.getElementById('tbody');
    if(row===tb.rows.length-1) addRow();
    focusCell(row+1,'x');
  }
}

function focusCell(row,col){
  const el=document.querySelector(`[data-r="${row}"][data-c="${col}"]`);
  if(el) el.focus();
}

function initTable(){
  for(let i=0;i<6;i++) addRow();
}

function getTableData(){
  const tb=document.getElementById('tbody');
  const x=[],y=[],excl=[];
  for(let i=0;i<tb.rows.length;i++){
    const row=tb.rows[i];
    const cb=row.cells[1].querySelector('input[type="checkbox"]');
    const xv=row.cells[2].querySelector('input').value.trim().replace(',','.');
    const yv=row.cells[3].querySelector('input').value.trim().replace(',','.');
    if(!xv||!yv) continue;
    const xf=parseFloat(xv), yf=parseFloat(yv);
    if(isNaN(xf)||isNaN(yf)) continue;
    if(cb&&cb.checked){ x.push(xf); y.push(yf); }
    else excl.push([xf,yf]);
  }
  return{x,y,excl};
}

/* ══════════════════════════════════════════════
   COMPUTE
══════════════════════════════════════════════ */
let recomputeTimer=null;
function autoRecompute(){
  updateMasterCheckbox();
  clearTimeout(recomputeTimer);
  recomputeTimer=setTimeout(()=>{
    if(regressionOn) computeRegression();
    else showPointsOnly();
  },350);
}

function toggleAll(checked){
  const tb=document.getElementById('tbody');
  for(let i=0;i<tb.rows.length;i++){
    const cb=tb.rows[i].cells[1].querySelector('input[type="checkbox"]');
    if(cb) cb.checked=checked;
  }
  clearTimeout(recomputeTimer);
  recomputeTimer=setTimeout(computeRegression,350);
}

function updateMasterCheckbox(){
  const tb=document.getElementById('tbody');
  const cbs=[...tb.querySelectorAll('input[type="checkbox"]')];
  if(!cbs.length) return;
  const all=cbs.every(c=>c.checked);
  const none=cbs.every(c=>!c.checked);
  const master=document.getElementById('cb-all');
  if(master){ master.checked=all; master.indeterminate=!all&&!none; }
}

function toggleRegression(){
  if(!regressionOn){
    regressionOn=true;
    computeRegression();
  } else {
    regressionOn=false;
    document.getElementById('btn-regrese').textContent='📊 Regrese';
    document.getElementById('resEq').textContent='—';
    document.getElementById('resParams').textContent='';
    lastResult=null;
    showPointsOnly();
  }
}

function showPointsOnly(){
  // zobraz všechny body z tabulky bez regresní křivky
  const {x,y,excl}=getTableData();
  const allX=[...x,...excl.map(p=>p[0])];
  const allY=[...y,...excl.map(p=>p[1])];
  if(!allX.length){ clearChart(); return; }

  if(chartInst){chartInst.destroy();chartInst=null;}
  const c=chartColors();
  const datasets=[];

  if(excl.length>0) datasets.push({
    type:'scatter',label:`Vyloučeno (${excl.length})`,
    data:excl.map(p=>({x:p[0],y:p[1]})),
    backgroundColor:'transparent',borderColor:'#4a9eff',
    pointStyle:'circle',pointRadius:6,pointBorderWidth:2,order:1
  });

  if(x.length>0) datasets.push({
    type:'scatter',label:'Data',
    data:x.map((xi,i)=>({x:xi,y:y[i]})),
    backgroundColor:'#4a9eff',borderColor:'rgba(255,255,255,.7)',
    borderWidth:1.5,pointRadius:6,order:2
  });

  const ctx=document.getElementById('myChart').getContext('2d');
  chartInst=new Chart(ctx,{
    type:'scatter',data:{datasets},
    options:{
      responsive:true,maintainAspectRatio:false,animation:{duration:200},
      scales:{
        x:{type:'linear',grid:{color:c.grid},ticks:{color:c.tick,font:{family:'Fira Code',size:11}},border:{color:c.axis},title:{display:true,text:axisLabels.x,color:c.tick,font:{family:'Sora',size:12}}},
        y:{type:'linear',grid:{color:c.grid},ticks:{color:c.tick,font:{family:'Fira Code',size:11}},border:{color:c.axis},title:{display:true,text:axisLabels.y,color:c.tick,font:{family:'Sora',size:12}}}
      },
      plugins:{
        legend:{labels:{color:c.tick,usePointStyle:true,font:{family:'Sora',size:11},boxWidth:10,padding:14}},
        tooltip:{callbacks:{label:ctx=>{const d=ctx.raw;return ` (${d.x}, ${typeof d.y==='number'?d.y.toPrecision(6):d.y})`;}}}
      }
    },
    plugins:[{id:'bgFill',beforeDraw(chart){const{ctx:c2,chartArea}=chart;if(!chartArea)return;c2.save();c2.fillStyle=isDark?'#1c1c24':'#fafafa';c2.fillRect(chartArea.left,chartArea.top,chartArea.width,chartArea.height);c2.restore();}}]
  });
}

function computeRegression(){
  const {x,y,excl}=getTableData();
  const eqEl=document.getElementById('resEq');
  const pmEl=document.getElementById('resParams');

  if(x.length<2){
    eqEl.innerHTML='<span class="err">❗ Zadejte alespoň 2 zaškrtnuté body.</span>';
    pmEl.innerHTML='';
    // i přesto zobraz vyloučené body
    showPointsOnly();
    return;
  }

  const type=document.getElementById('rType').value;
  let result;
  try{
    if(type==='linear')           result=doLinear(x,y);
    else if(type==='exponential') result=doExponential(x,y);
    else if(type==='polynomial')  result=doPolynomial(x,y);
    else if(type==='logarithmic') result=doLogarithmic(x,y);
    else if(type==='gaussian')    result=doGaussian(x,y);
  }catch(err){
    eqEl.innerHTML=`<span class="err">❗ ${err.message}</span>`;
    pmEl.innerHTML='';
    return;
  }

  displayResults(result, x.length, x.length+excl.length);
  lastResult=result; lastData={x,y,excl};
  document.getElementById('btn-regrese').textContent='✕ Skrýt regresi';
  updateChart(result, x, y, excl);
}

/* ══════════════════════════════════════════════
   DISPLAY RESULTS
══════════════════════════════════════════════ */
function displayResults(r, used, total){
  document.getElementById('resEq').innerHTML=`📈 ${r.eq}`;
  let html='';
  if(r.type==='gaussian'){
    html+=`• A = (${f6(r.a)} ± ${f6(r.seA)})<br>`
         +`• μ = (${f6(r.b)} ± ${f6(r.seB)})<br>`
         +`• σ = (${f6(r.c)} ± ${f6(r.seC)})<br>`
         +`• FWHM = (${f6(r.FWHM)} ± ${f6(r.seFWHM)})<br>`
         +`• c = (${f6(r.d)} ± ${f6(r.seD)})<br>`;
  } else {
    html+=`• a = (${f6(r.a)} ± ${f6(r.seA)})<br>`
         +`• b = (${f6(r.b)} ± ${f6(r.seB)})<br>`;
    if(r.type==='polynomial')
      html+=`• c = (${f6(r.c)} ± ${f6(r.seC)})<br>`;
  }
  html+=`• R² = <span class="r2">${r.r2.toFixed(6)}</span><br>`
       +`• Použito bodů: ${used} / ${total}`;
  document.getElementById('resParams').innerHTML=html;
}

/* ══════════════════════════════════════════════
   CHART
══════════════════════════════════════════════ */
function chartColors(){
  return isDark
    ? {bg:'#1c1c24',grid:'rgba(255,255,255,.08)',tick:'#a0a0b8',axis:'#505068'}
    : {bg:'#fafafa', grid:'rgba(0,0,0,.07)',     tick:'#444456',axis:'#ccccd8'};
}

function clearChart(){
  if(chartInst){chartInst.destroy();chartInst=null;}
  const c=chartColors();
  const canvas=document.getElementById('myChart');
  const ctx=canvas.getContext('2d');
  ctx.fillStyle=c.bg;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

function updateChart(result, x, y, excl){
  if(chartInst){chartInst.destroy();chartInst=null;}

  // Smooth curve – 120 points
  const xMin=Math.min(...x), xMax=Math.max(...x);
  const step=(xMax-xMin)/119||1;
  const xSmooth=Array.from({length:120},(_,i)=>xMin+i*step);
  let ySmooth;
  try{ ySmooth=xSmooth.map(result.smooth); }
  catch(e){ ySmooth=xSmooth.map(()=>NaN); }

  const c=chartColors();
  const datasets=[];

  if(excl.length>0){
    datasets.push({
      type:'scatter',label:`Vyloučeno (${excl.length})`,
      data:excl.map(p=>({x:p[0],y:p[1]})),
      backgroundColor:'transparent',borderColor:'#4a9eff',
      pointStyle:'circle',pointRadius:6,pointBorderWidth:2,order:1
    });
  }

  datasets.push({
    type:'scatter',label:'Data',
    data:x.map((xi,i)=>({x:xi,y:y[i]})),
    backgroundColor:'#4a9eff',borderColor:'rgba(255,255,255,.7)',
    borderWidth:1.5,pointRadius:6,order:2
  });

  datasets.push({
    type:'line',label:result.eq,
    data:xSmooth.map((xi,i)=>({x:xi,y:ySmooth[i]})),
    borderColor:'#ff6b6b',borderWidth:2.5,
    pointRadius:0,fill:false,tension:0,order:3
  });

  const ctx=document.getElementById('myChart').getContext('2d');
  chartInst=new Chart(ctx,{
    type:'scatter',
    data:{datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      animation:{duration:300},
      scales:{
        x:{type:'linear',
           grid:{color:c.grid},
           ticks:{color:c.tick,font:{family:'Fira Code',size:11}},
           border:{color:c.axis},
           title:{display:true,text:axisLabels.x,color:c.tick,font:{family:'Sora',size:12}}},
        y:{type:'linear',
           grid:{color:c.grid},
           ticks:{color:c.tick,font:{family:'Fira Code',size:11}},
           border:{color:c.axis},
           title:{display:true,text:axisLabels.y,color:c.tick,font:{family:'Sora',size:12}}}
      },
      plugins:{
        legend:{
          labels:{color:c.tick,usePointStyle:true,
                  font:{family:'Sora',size:11},boxWidth:10,padding:14}
        },
        tooltip:{
          callbacks:{
            label:ctx=>{
              const d=ctx.raw;
              return ` (${d.x}, ${typeof d.y==='number'?d.y.toPrecision(6):d.y})`;
            }
          }
        }
      },
      backgroundColor:c.bg
    },
    plugins:[{
      id:'bgFill',
      beforeDraw(chart){
        const{ctx:c2,chartArea}=chart;
        if(!chartArea) return;
        c2.save();
        c2.fillStyle=isDark?'#1c1c24':'#fafafa';
        c2.fillRect(chartArea.left,chartArea.top,chartArea.width,chartArea.height);
        c2.restore();
      }
    }]
  });
}

/* ══════════════════════════════════════════════
   ACTIONS
══════════════════════════════════════════════ */
/* ══════════════════════════════════════════════
   FILE IMPORT
══════════════════════════════════════════════ */
function loadFile(input){
  const file=input.files[0];
  if(!file) return;
  input.value=''; // reset so same file can be re-loaded
  const reader=new FileReader();
  reader.onload=e=>{
    const text=e.target.result;
    parseAndFill(text);
  };
  reader.readAsText(file);
}

function parseAndFill(text){
  const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'));
  if(!lines.length) return;

  // Detect separator: try tab, semicolon, comma, multiple spaces
  function splitLine(line){
    if(line.includes('\t'))  return line.split('\t').map(s=>s.trim());
    if(line.includes(';'))   return line.split(';').map(s=>s.trim());
    if(line.includes(','))   return line.split(',').map(s=>s.trim());
    return line.split(/\s+/).filter(s=>s!=='');
  }

  // Detect header: first line contains non-numeric token
  let headerX='x', headerY='y', dataStart=0;
  const firstParts=splitLine(lines[0]);
  if(firstParts.length>=2 && (isNaN(firstParts[0].replace(',','.')) || isNaN(firstParts[1].replace(',','.')))){
    headerX=firstParts[0]||'x';
    headerY=firstParts[1]||'y';
    dataStart=1;
  }
  axisLabels={x:headerX, y:headerY};

  // Parse data rows
  const rows=[];
  for(let i=dataStart;i<lines.length;i++){
    const parts=splitLine(lines[i]);
    if(parts.length<2) continue;
    const xv=parseFloat(parts[0].replace(',','.'));
    const yv=parseFloat(parts[1].replace(',','.'));
    if(!isNaN(xv)&&!isNaN(yv)) rows.push([xv,yv]);
  }
  if(!rows.length){ alert('Nepodařilo se načíst žádná data.'); return; }

  // Fill table
  const tb=document.getElementById('tbody');
  tb.innerHTML='';
  regressionOn=false;
  document.getElementById('btn-regrese').textContent='📊 Regrese';
  document.getElementById('resEq').textContent='—';
  document.getElementById('resParams').textContent='';

  rows.forEach(([xv,yv],i)=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td class="row-num">${i+1}</td>
      <td><input type="checkbox" checked onchange="autoRecompute()"></td>
      <td><input class="cell" type="text" value="${xv}" data-r="${i}" data-c="x"
                 onkeydown="handleKey(event,${i},'x')" oninput="autoRecompute()"></td>
      <td><input class="cell" type="text" value="${yv}" data-r="${i}" data-c="y"
                 onkeydown="handleKey(event,${i},'y')" oninput="autoRecompute()"></td>`;
    tb.appendChild(tr);
  });
  // always keep at least one empty row at the end
  addRow();
  updateMasterCheckbox();
  showPointsOnly();
  document.getElementById('resEq').innerHTML=
    `<span style="color:var(--success)">✅ Načteno ${rows.length} bodů${dataStart?` · osy: ${headerX}, ${headerY}`:''}</span>`;
}

/* ══════════════════════════════════════════════
   RECTANGLE SELECTION
══════════════════════════════════════════════ */
let selectMode=false;
let selStart=null, selRect=null;

function toggleSelectMode(){
  selectMode=!selectMode;
  const btn=document.getElementById('btn-select');
  const overlay=document.getElementById('sel-overlay');
  if(selectMode){
    btn.textContent='✕ Zrušit výběr';
    btn.style.borderColor='var(--accent)';
    btn.style.color='var(--accent)';
    overlay.classList.add('active');
    // uncheck all points
    const tb=document.getElementById('tbody');
    tb.querySelectorAll('input[type="checkbox"]').forEach(cb=>cb.checked=false);
    updateMasterCheckbox();
    if(regressionOn) computeRegression(); else showPointsOnly();
  } else {
    exitSelectMode();
  }
}

function exitSelectMode(){
  selectMode=false;
  const btn=document.getElementById('btn-select');
  btn.textContent='⬚ Vybrat oblast';
  btn.style.borderColor='';
  btn.style.color='';
  const overlay=document.getElementById('sel-overlay');
  overlay.classList.remove('active');
  // remove rect if any
  const r=overlay.querySelector('.sel-rect');
  if(r) r.remove();
  selStart=null; selRect=null;
}

function getOverlayPos(e, overlay){
  const rect=overlay.getBoundingClientRect();
  return {x:e.clientX-rect.left, y:e.clientY-rect.top};
}

document.addEventListener('DOMContentLoaded',()=>{
  const overlay=document.getElementById('sel-overlay');

  overlay.addEventListener('mousedown',e=>{
    if(!selectMode) return;
    selStart=getOverlayPos(e,overlay);
    // create rect element
    const r=document.createElement('div');
    r.className='sel-rect';
    r.style.left=selStart.x+'px'; r.style.top=selStart.y+'px';
    r.style.width='0'; r.style.height='0';
    overlay.appendChild(r);
    selRect=r;
    e.preventDefault();
  });

  overlay.addEventListener('mousemove',e=>{
    if(!selectMode||!selStart||!selRect) return;
    const pos=getOverlayPos(e,overlay);
    const x=Math.min(pos.x,selStart.x), y=Math.min(pos.y,selStart.y);
    const w=Math.abs(pos.x-selStart.x), h=Math.abs(pos.y-selStart.y);
    selRect.style.left=x+'px'; selRect.style.top=y+'px';
    selRect.style.width=w+'px'; selRect.style.height=h+'px';
    e.preventDefault();
  });

  overlay.addEventListener('mouseup',e=>{
    if(!selectMode||!selStart||!selRect||!chartInst) return;
    const pos=getOverlayPos(e,overlay);

    // pixel bounds of selection
    const px1=Math.min(selStart.x,pos.x), px2=Math.max(selStart.x,pos.x);
    const py1=Math.min(selStart.y,pos.y), py2=Math.max(selStart.y,pos.y);

    // convert to data coords via chart scales
    const xScale=chartInst.scales.x, yScale=chartInst.scales.y;
    const dxMin=xScale.getValueForPixel(px1), dxMax=xScale.getValueForPixel(px2);
    const dyMin=yScale.getValueForPixel(py2), dyMax=yScale.getValueForPixel(py1);

    // check rows whose data falls inside
    const tb=document.getElementById('tbody');
    let found=0;
    for(let i=0;i<tb.rows.length;i++){
      const xv=parseFloat(tb.rows[i].cells[2]?.querySelector('input')?.value?.replace(',','.'));
      const yv=parseFloat(tb.rows[i].cells[3]?.querySelector('input')?.value?.replace(',','.'));
      if(!isNaN(xv)&&!isNaN(yv) && xv>=dxMin&&xv<=dxMax && yv>=dyMin&&yv<=dyMax){
        const cb=tb.rows[i].cells[1]?.querySelector('input[type="checkbox"]');
        if(cb){ cb.checked=true; found++; }
      }
    }

    // clean up
    selRect.remove(); selRect=null; selStart=null;
    exitSelectMode();
    updateMasterCheckbox();
    if(regressionOn) computeRegression(); else showPointsOnly();
  });
});

function swapXY(){
  const tb=document.getElementById('tbody');
  for(let i=0;i<tb.rows.length;i++){
    const xI=tb.rows[i].cells[2].querySelector('input');
    const yI=tb.rows[i].cells[3].querySelector('input');
    [xI.value,yI.value]=[yI.value,xI.value];
  }
  if(regressionOn) computeRegression();
  else showPointsOnly();
}

function clearData(){
  if(!confirm('Opravdu smazat všechna data?')) return;
  regressionOn=false;
  document.getElementById('btn-regrese').textContent='📊 Regrese';
  const tb=document.getElementById('tbody');
  tb.innerHTML='';
  for(let i=0;i<6;i++) addRow();
  document.getElementById('resEq').textContent='—';
  document.getElementById('resParams').textContent='';
  clearChart();
}

function saveGraph(){
  if(!lastResult||!lastData){alert('Nejprve proveďte regresi.');return;}
  const {x,y,excl}=lastData, result=lastResult;

  // Offscreen canvas – vždy světlé barvy
  const tmp=document.createElement('canvas');
  tmp.width=900; tmp.height=600;
  document.body.appendChild(tmp);

  const lc={bg:'#fafafa',grid:'rgba(0,0,0,.07)',tick:'#33334a',axis:'#cccccc'};

  const xMin=Math.min(...x),xMax=Math.max(...x);
  const step=(xMax-xMin)/119||1;
  const xSmooth=Array.from({length:120},(_,i)=>xMin+i*step);
  let ySmooth;
  try{ySmooth=xSmooth.map(result.smooth);}catch(e){ySmooth=xSmooth.map(()=>NaN);}

  const ds=[];
  if(excl.length>0) ds.push({
    type:'scatter',label:`Vyloučeno (${excl.length})`,
    data:excl.map(p=>({x:p[0],y:p[1]})),
    backgroundColor:'transparent',borderColor:'#2264c0',
    pointStyle:'circle',pointRadius:6,pointBorderWidth:2,order:1
  });
  ds.push({
    type:'scatter',label:'Data',
    data:x.map((xi,i)=>({x:xi,y:y[i]})),
    backgroundColor:'#2264c0',borderColor:'rgba(0,0,0,.25)',
    borderWidth:1.5,pointRadius:6,order:2
  });
  ds.push({
    type:'line',label:result.eq,
    data:xSmooth.map((xi,i)=>({x:xi,y:ySmooth[i]})),
    borderColor:'#cc3030',borderWidth:2.5,pointRadius:0,fill:false,tension:0,order:3
  });

  const ec=new Chart(tmp,{
    type:'scatter',data:{datasets:ds},
    options:{
      responsive:false,animation:false,
      scales:{
        x:{type:'linear',grid:{color:lc.grid},
           ticks:{color:lc.tick,font:{family:'Fira Code',size:11}},
           border:{color:lc.axis},
           title:{display:true,text:axisLabels.x,color:lc.tick,font:{family:'Sora',size:12}}},
        y:{type:'linear',grid:{color:lc.grid},
           ticks:{color:lc.tick,font:{family:'Fira Code',size:11}},
           border:{color:lc.axis},
           title:{display:true,text:axisLabels.y,color:lc.tick,font:{family:'Sora',size:12}}}
      },
      plugins:{
        legend:{labels:{color:lc.tick,usePointStyle:true,
                        font:{family:'Sora',size:11},boxWidth:10,padding:14}},
        tooltip:{enabled:false}
      }
    },
    plugins:[{id:'bg',beforeDraw(ch){
      const{ctx:c2,chartArea:ca}=ch;
      if(!ca) return;
      c2.save();c2.fillStyle='#ffffff';
      c2.fillRect(0,0,tmp.width,tmp.height);
      c2.restore();
    }}]
  });

  setTimeout(()=>{
    const a=document.createElement('a');
    a.href=tmp.toDataURL('image/jpeg',0.96);
    a.download='regrese.jpg';
    a.click();
    ec.destroy();
    document.body.removeChild(tmp);
  },120);
}
